<!DOCTYPE html>
<!-- design-system-version: 1.0 | synced with design-system.html | last updated: 2026-03-07 -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoped AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Design System Tokens — synced with design-system.html -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter','ui-sans-serif','system-ui','-apple-system','sans-serif'],
                        mono: ['JetBrains Mono','ui-monospace','monospace']
                    },
                    colors: {
                        /* ── DS Surface ── */
                        bg:      { DEFAULT:'#090B1E' },
                        surface: { DEFAULT:'#0D1028', 2:'#111435' },
                        border:  { DEFAULT:'#1A2448', bright:'rgba(165,180,252,0.4)' },
                        /* ── DS Accent ── */
                        accent:  { DEFAULT:'#a5b4fc', light:'#c7d2fe', dim:'rgba(165,180,252,0.13)' },
                        /* ── DS Text ── */
                        ink:     { primary:'#FFFFFF', secondary:'#B0B8D0', muted:'#48527A' },
                        /* keep sky/zinc for any legacy classes still used */
                        sky:  { 50:'#f0f9ff',100:'#e0f2fe',200:'#bae6fd',300:'#7dd3fc',400:'#38bdf8',500:'#0ea5e9',600:'#0284c7',700:'#02649b',800:'#01446e',900:'#012e40' },
                        zinc: { 50:'#fafafa',100:'#f4f4f5',200:'#e4e4e7',300:'#d4d4d8',400:'#a1a1aa',500:'#71717a',600:'#52525b',700:'#3f3f46',800:'#27272a',900:'#18181b',950:'#09090b' }
                    },
                    backgroundImage: {
                        'grad-accent':  'linear-gradient(135deg,#a5b4fc 0%,#67e8f9 60%,#c4b5fd 100%)',
                        'grad-surface': 'linear-gradient(160deg,#111435 0%,#0D1028 100%)',
                        'grad-border':  'linear-gradient(135deg,rgba(165,180,252,0.6) 0%,rgba(103,232,249,0.4) 50%,rgba(196,181,253,0.5) 100%)',
                    },
                    boxShadow: {
                        'glow-sm': '0 0 16px rgba(165,180,252,0.28)',
                        'glow-md': '0 0 32px rgba(165,180,252,0.36)',
                        'glow-lg': '0 0 56px rgba(165,180,252,0.3)',
                    },
                    borderRadius: {
                        'ds-sm':'4px','ds-md':'8px','ds-lg':'16px','ds-xl':'24px'
                    }
                }
            }
        }
    </script>
    <style>
        /* ── Design System CSS Variables ── */
        :root {
            --color-bg:             #090B1E;
            --color-surface:        #0D1028;
            --color-surface-2:      #111435;
            --color-border:         #1A2448;
            --color-border-bright:  rgba(165,180,252,0.4);
            --color-accent:         #a5b4fc;
            --color-accent-light:   #c7d2fe;
            --color-cyan:           #67e8f9;
            --color-text-primary:   #FFFFFF;
            --color-text-secondary: #B0B8D0;
            --color-text-muted:     #48527A;
            --font-display:         'Inter', sans-serif;
            --font-mono:            'JetBrains Mono', monospace;
            --grad-mid:             linear-gradient(135deg,#a5b4fc 0%,#67e8f9 60%,#c4b5fd 100%);
            --grad-deep:            linear-gradient(135deg,#1e1b4b 0%,#0c1a3a 100%);
            --grad-soft:            linear-gradient(135deg,rgba(165,180,252,0.18) 0%,rgba(103,232,249,0.14) 100%);
            --grad-surface:         linear-gradient(160deg,#111435 0%,#0D1028 100%);
            --glow-per:             rgba(165,180,252,0.5);
            --glow-cyn:             rgba(103,232,249,0.4);
            --radius-sm:4px; --radius-md:8px; --radius-lg:16px; --radius-xl:24px;
        }
        *{box-sizing:border-box}
        body{font-family:var(--font-display);margin:0;background:var(--color-bg);color:var(--color-text-primary);-webkit-font-smoothing:antialiased}
        .fade-in{animation:fadeIn 0.25s ease-out}
        @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .slide-in{animation:slideIn 0.3s ease-out}
        @keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
        input,select,textarea{color-scheme:dark;font-family:var(--font-display)}
        ::-webkit-scrollbar{width:6px;height:6px}
        ::-webkit-scrollbar-track{background:var(--color-bg)}
        ::-webkit-scrollbar-thumb{background:rgba(165,180,252,0.35);border-radius:3px}
        ::-webkit-scrollbar-thumb:hover{background:var(--color-accent)}
        .sparkline-bar{transition:height 0.3s ease}
        .tier-direct{background:rgba(255,59,92,0.13);color:#ff6b84;border:1px solid rgba(255,59,92,0.28)}
        .tier-indirect{background:rgba(255,179,0,0.13);color:#ffd040;border:1px solid rgba(255,179,0,0.28)}
        .tier-emerging{background:rgba(165,180,252,0.13);color:#c7d2fe;border:1px solid rgba(165,180,252,0.28)}
        .signal-product{background:rgba(103,232,249,0.12);color:#67e8f9;border:1px solid rgba(103,232,249,0.28)}
        .signal-business{background:rgba(0,229,160,0.12);color:#34ffbd;border:1px solid rgba(0,229,160,0.28)}
        .signal-team{background:rgba(196,181,253,0.12);color:#c4b5fd;border:1px solid rgba(196,181,253,0.28)}
        .signal-legal{background:rgba(255,59,92,0.13);color:#ff6b84;border:1px solid rgba(255,59,92,0.28)}
        .signal-marketing{background:rgba(255,179,0,0.13);color:#ffd040;border:1px solid rgba(255,179,0,0.28)}
        .signal-sentiment{background:rgba(236,72,153,0.13);color:#f9a8d4;border:1px solid rgba(236,72,153,0.28)}
        .sev-critical{background:rgba(255,59,92,0.13);color:#ff6b84}
        .sev-high{background:rgba(255,179,0,0.13);color:#ffd040}
        .sev-medium{background:rgba(165,180,252,0.13);color:#a5b4fc}
        .sev-low{background:rgba(113,113,122,0.15);color:#a1a1aa}
        .tab-active{border-bottom:2px solid var(--color-accent);color:var(--color-text-primary)}
        .tab-inactive{border-bottom:2px solid transparent;color:var(--color-text-muted)}
        .table-row-hover:hover{background:rgba(165,180,252,0.06)}
        .changed-cell{background:rgba(165,180,252,0.09)!important;border-left:2px solid var(--color-accent)}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center}
        .progress-bar{height:3px;background:var(--color-border);border-radius:2px;overflow:hidden}
        .progress-fill{height:100%;background:var(--grad-mid);background-size:300% 100%;animation:progress-shimmer 4s ease-in-out infinite alternate;transition:width 1.2s ease}
        @keyframes progress-shimmer{0%{background-position:0% 50%}100%{background-position:100% 50%}}
        .generating-dot{width:6px;height:6px;border-radius:50%;background:#a5b4fc;animation:pulse 1s ease-in-out infinite}
        .generating-dot:nth-child(2){animation-delay:0.2s}
        .generating-dot:nth-child(3){animation-delay:0.4s}
        @keyframes pulse{0%,80%,100%{opacity:0.3;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}
        .tooltip-wrap{position:relative}
        .tooltip-wrap:hover .tooltip-text{display:block}
        .tooltip-text{display:none;position:absolute;bottom:calc(100%+6px);left:50%;transform:translateX(-50%);background:#3f3f46;color:#fafafa;padding:4px 10px;border-radius:6px;font-size:11px;white-space:nowrap;z-index:50;pointer-events:none}
        .map-dot{position:absolute;width:10px;height:10px;border-radius:50%;transform:translate(-50%,-50%);cursor:pointer;transition:transform 0.15s}
        .map-dot:hover{transform:translate(-50%,-50%) scale(1.6)}
        .drawer{position:fixed;right:0;top:0;height:100%;width:420px;background:var(--color-surface);border-left:1px solid var(--color-border);z-index:80;overflow-y:auto;transition:transform 0.3s ease}
        .drawer-closed{transform:translateX(100%)}
        .drawer-open{transform:translateX(0)}

        /* ── Nav Sidebar ── */
        .app-nav{
            background:#07081A;
            border-right:1px solid rgba(255,255,255,0.045);
            transition:width 0.25s cubic-bezier(0.4,0,0.2,1);
            overflow:hidden;
            flex-shrink:0;
            display:flex;
            flex-direction:column;
            padding:12px 0;
        }
        .app-nav.collapsed{ width:64px }
        .app-nav.expanded { width:200px }

        /* Logo mark — centered row at top */
        .nav-logo-row{
            display:flex;
            align-items:center;
            height:40px;
            margin-bottom:16px;
            flex-shrink:0;
            padding:0 12px;
            gap:10px;
            overflow:hidden;
        }
        .nav-logo{
            width:40px;
            height:40px;
            min-width:40px;
            border-radius:11px;
            background:#05060F;
            display:flex;
            align-items:center;
            justify-content:center;
            box-shadow:0 0 0 1px rgba(165,180,252,0.18), 0 0 18px rgba(165,180,252,0.22), 0 0 32px rgba(103,232,249,0.12);
            overflow:hidden;
        }
        .nav-logo-text{
            font-size:13px;
            font-weight:700;
            color:#C8CAEB;
            white-space:nowrap;
            opacity:0;
            max-width:0;
            overflow:hidden;
            transition:opacity 0.2s ease, max-width 0.25s cubic-bezier(0.4,0,0.2,1);
            letter-spacing:0.01em;
        }
        .app-nav.expanded .nav-logo-text{ opacity:1; max-width:120px }

        /* Nav item row */
        .nav-item{
            display:flex;
            align-items:center;
            gap:10px;
            padding:0 12px;
            height:52px;
            border-radius:0;
            cursor:pointer;
            background:none;
            border:none;
            width:100%;
            text-align:left;
            transition:background 0.15s ease;
            flex-shrink:0;
            overflow:hidden;
        }
        .nav-item:focus{ outline:none }
        .nav-item:hover{ background:rgba(255,255,255,0.025) }

        /* Glow on hover and active */
        .nav-item:hover .nav-icon-tile{
            box-shadow:0 0 0 1.5px rgba(165,180,252,0.45), 0 0 14px rgba(165,180,252,0.26), 0 0 28px rgba(103,232,249,0.14);
            transform:translateY(-1px);
        }
        .nav-item.active .nav-icon-tile{
            box-shadow:0 0 0 1.5px rgba(165,180,252,0.6), 0 0 18px rgba(165,180,252,0.38), 0 0 36px rgba(103,232,249,0.18);
        }

        /* Icon tile — centered inside each row */
        .nav-icon-tile{
            width:40px;
            height:40px;
            min-width:40px;
            border-radius:11px;
            background:linear-gradient(145deg,#12153A 0%,#0C0E26 100%);
            display:flex;
            align-items:center;
            justify-content:center;
            transition:box-shadow 0.22s ease, transform 0.22s ease;
            position:relative;
            overflow:hidden;
        }
        .nav-icon-tile::before{
            content:'';
            position:absolute;
            top:0;left:0;right:0;
            height:45%;
            background:linear-gradient(180deg,rgba(255,255,255,0.055) 0%,transparent 100%);
            border-radius:11px 11px 0 0;
            pointer-events:none;
        }
        .nav-icon-tile svg{ display:block; overflow:visible }

        /* Label text */
        .nav-label{
            font-size:13px;
            font-weight:500;
            color:#3E4470;
            white-space:nowrap;
            overflow:hidden;
            transition:color 0.15s ease, opacity 0.2s ease, max-width 0.25s cubic-bezier(0.4,0,0.2,1);
        }
        .nav-item:hover .nav-label{ color:#8B8FBF }
        .nav-item.active .nav-label{ color:#C8CAEB }

        /* Expand/collapse toggle row */
        .nav-expand-row{
            display:flex;
            align-items:center;
            gap:10px;
            padding:0 12px;
            height:36px;
            cursor:pointer;
            background:none;
            border:none;
            width:100%;
            flex-shrink:0;
            overflow:hidden;
            transition:background 0.15s;
        }
        .nav-expand-row:hover{ background:rgba(255,255,255,0.025) }
        .nav-expand-row:focus{ outline:none }
        .nav-expand-icon{
            width:40px;
            height:40px;
            min-width:40px;
            display:flex;
            align-items:center;
            justify-content:center;
            color:#2A2F52;
            transition:color 0.15s;
            flex-shrink:0;
        }
        .nav-expand-row:hover .nav-expand-icon{ color:#6B70A8 }
        .nav-expand-chevron{
            transition:transform 0.25s cubic-bezier(0.4,0,0.2,1);
            display:flex; align-items:center; justify-content:center;
        }
        .nav-expand-chevron.open{ transform:rotate(180deg) }
        .nav-expand-label{
            font-size:12px;
            font-weight:500;
            color:#2A2F52;
            white-space:nowrap;
            overflow:hidden;
            opacity:0;
            max-width:0;
            transition:opacity 0.2s ease, max-width 0.25s cubic-bezier(0.4,0,0.2,1), color 0.15s;
        }
        .app-nav.expanded .nav-expand-label{ opacity:1; max-width:100px }
        .nav-expand-row:hover .nav-expand-label{ color:#6B70A8 }

        /* ── Hover-only icon animations ── */
        /* Float up/down on hover */
        @keyframes nav-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-2.5px)}}
        /* Gentle rotation on hover */
        @keyframes nav-spin-hover{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        /* Bar grow beat on hover */
        @keyframes nav-bar1{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.18)}}
        @keyframes nav-bar2{0%,100%{transform:scaleY(1)}33%{transform:scaleY(1.22)}}
        @keyframes nav-bar3{0%,100%{transform:scaleY(1)}66%{transform:scaleY(1.15)}}
        /* Pulse glow for active dot */
        @keyframes nav-pulse{0%,100%{opacity:0.5;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}

        /* Apply hover animations via parent hover */
        .nav-item:hover .icon-anim-float{ animation:nav-float 1.6s ease-in-out infinite }
        .nav-item:hover .icon-anim-spin{ animation:nav-spin-hover 4s linear infinite }
        .nav-item:hover .icon-anim-bar1{ animation:nav-bar1 1.2s ease-in-out infinite; transform-origin:center bottom }
        .nav-item:hover .icon-anim-bar2{ animation:nav-bar2 1.2s ease-in-out infinite 0.2s; transform-origin:center bottom }
        .nav-item:hover .icon-anim-bar3{ animation:nav-bar3 1.2s ease-in-out infinite 0.4s; transform-origin:center bottom }
        /* Active state keeps a subtle pulse on special elements */
        .nav-item.active .icon-anim-pulse{ animation:nav-pulse 2.2s ease-in-out infinite }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ─── Nav Icons ────────────────────────────────────────────────────────────────
// Unified indigo/violet palette. Animations trigger on hover only (via CSS parent hover).
// Active state = glow ring (CSS box-shadow on tile). No continuous spin.

const NavGradientDefs = () => (
    <svg width="0" height="0" style={{position:'absolute',overflow:'hidden',pointerEvents:'none'}}>
        <defs>
            <linearGradient id="ni-fill" x1="0.2" y1="0" x2="0.8" y2="1">
                <stop offset="0%" stopColor="#a5b4fc"/>
                <stop offset="100%" stopColor="#67e8f9"/>
            </linearGradient>
            <linearGradient id="ni-hi" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#e0e7ff" stopOpacity="0.85"/>
                <stop offset="100%" stopColor="#a5b4fc" stopOpacity="0.4"/>
            </linearGradient>
            <linearGradient id="ni-sh" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stopColor="#4338ca" stopOpacity="0.85"/>
                <stop offset="100%" stopColor="#1e1b4b" stopOpacity="0.95"/>
            </linearGradient>
            <linearGradient id="ni-dim" x1="0.2" y1="0" x2="0.8" y2="1">
                <stop offset="0%" stopColor="#3a3d6a"/>
                <stop offset="100%" stopColor="#1e1b4b"/>
            </linearGradient>
            <linearGradient id="ni-dim-hi" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#4a4e7a" stopOpacity="0.7"/>
                <stop offset="100%" stopColor="#2a2858" stopOpacity="0.3"/>
            </linearGradient>
            <linearGradient id="ni-stroke" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stopColor="#a5b4fc"/>
                <stop offset="100%" stopColor="#67e8f9"/>
            </linearGradient>
        </defs>
    </svg>
);

// ── Insights: Clean globe with latitude/longitude lines ──
const IconInsights = ({ active }) => {
    const f  = active ? 'url(#ni-fill)' : 'url(#ni-dim)';
    const h  = active ? 'url(#ni-hi)'   : 'url(#ni-dim-hi)';
    const sc = active ? '#8B8FFF'        : '#3A3D68';
    return (
        <div className="nav-icon-tile">
            <svg width="26" height="26" viewBox="0 0 26 26" fill="none" className="icon-anim-float">
                {/* Globe sphere */}
                <circle cx="13" cy="13" r="9" fill={f}/>
                {/* Top highlight cap */}
                <ellipse cx="13" cy="8.5" rx="5" ry="3" fill={h} fillOpacity="0.55"/>
                {/* Equator */}
                <ellipse cx="13" cy="13" rx="9" ry="3.2" stroke={sc} strokeWidth="0.9" fill="none" strokeOpacity="0.45"/>
                {/* Upper lat line */}
                <ellipse cx="13" cy="9.5" rx="6.5" ry="2.2" stroke={sc} strokeWidth="0.7" fill="none" strokeOpacity="0.3"/>
                {/* Lower lat line */}
                <ellipse cx="13" cy="16.5" rx="6.5" ry="2.2" stroke={sc} strokeWidth="0.7" fill="none" strokeOpacity="0.3"/>
                {/* Central meridian */}
                <ellipse cx="13" cy="13" rx="3.5" ry="9" stroke={sc} strokeWidth="0.9" fill="none" strokeOpacity="0.4"/>
                {/* Glint */}
                <circle cx="10" cy="9.5" r="1.6" fill="white" fillOpacity={active ? '0.3' : '0.1'}/>
            </svg>
        </div>
    );
};

// ── Roadmap: winding path with location pin + waypoint dots ──
const IconRoadmap = ({ active }) => {
    const sc = active ? '#9498FF' : '#3A3D68';
    const fc = active ? 'url(#ni-fill)' : 'url(#ni-dim)';
    const hc = active ? 'url(#ni-hi)'   : 'url(#ni-dim-hi)';
    const op = active ? '0.75' : '0.4';
    return (
        <div className="nav-icon-tile">
            <svg width="26" height="26" viewBox="0 0 26 26" fill="none" className="icon-anim-float">
                {/*
                  3-switchback winding path (left→right→left→right→pin):
                  Start bottom-left, curve right, switchback left, curve right again, up to pin top-right
                */}
                <path
                    d="M5 23 C5 23 5 20 8 19 C11 18 13 18 15 17 C17 16 18 15 18 13 C18 11 16 10 14 10 C12 10 10 10 9 9 C7 8 7 7 8 5.5"
                    stroke={sc} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"
                    fill="none" strokeOpacity={op}/>
                {/* Dot 1 — bottom start */}
                <circle cx="5" cy="23" r="2" fill={fc}/>
                <circle cx="5" cy="23" r="2" fill={hc} fillOpacity="0.4"/>
                {/* Dot 2 — first switchback (right side) */}
                <circle cx="17.5" cy="15" r="1.8" fill={fc}/>
                <circle cx="17.5" cy="15" r="1.8" fill={hc} fillOpacity="0.35"/>
                {/* Dot 3 — second switchback (left side) */}
                <circle cx="8.5" cy="9.5" r="1.8" fill={fc}/>
                <circle cx="8.5" cy="9.5" r="1.8" fill={hc} fillOpacity="0.35"/>
                {/* Location pin at top */}
                <circle cx="13" cy="4.5" r="3.2" fill={fc}/>
                <circle cx="13" cy="4.5" r="3.2" fill={hc} fillOpacity="0.45"/>
                <circle cx="13" cy="4.2" r="1.3" fill="#07081A" fillOpacity="0.65"/>
                {/* Pin teardrop point */}
                <path d="M13 7.7 L11.4 5.8 L14.6 5.8 Z" fill={fc}/>
            </svg>
        </div>
    );
};

// ── Priorities: stacked horizontal bars at staggering heights ──
const IconPriorities = ({ active }) => {
    const f = active ? 'url(#ni-fill)' : 'url(#ni-dim)';
    const h = active ? 'url(#ni-hi)'   : 'url(#ni-dim-hi)';
    const lc = active ? '#3A3D6A'       : '#1E1E3A';
    return (
        <div className="nav-icon-tile">
            <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
                {/* Floor */}
                <line x1="3" y1="23" x2="23" y2="23" stroke={lc} strokeWidth="1" strokeLinecap="round"/>
                {/* Bar 1 — tall, left */}
                <g className="icon-anim-bar1">
                    <rect x="3.5" y="8" width="5.5" height="15" rx="1.5" fill={f}/>
                    <rect x="3.5" y="8" width="5.5" height="3" rx="1" fill={h} fillOpacity="0.5"/>
                </g>
                {/* Bar 2 — tallest, center */}
                <g className="icon-anim-bar2">
                    <rect x="10.5" y="4" width="5" height="19" rx="1.5" fill={f}/>
                    <rect x="10.5" y="4" width="5" height="3" rx="1" fill={h} fillOpacity="0.5"/>
                </g>
                {/* Bar 3 — short, right */}
                <g className="icon-anim-bar3">
                    <rect x="17" y="13" width="5.5" height="10" rx="1.5" fill={f}/>
                    <rect x="17" y="13" width="5.5" height="3" rx="1" fill={h} fillOpacity="0.5"/>
                </g>
            </svg>
        </div>
    );
};

// ── Alignment: megaphone / announcement horn ──
const IconAlignment = ({ active }) => {
    const f  = active ? 'url(#ni-fill)' : 'url(#ni-dim)';
    const h  = active ? 'url(#ni-hi)'   : 'url(#ni-dim-hi)';
    const s  = active ? 'url(#ni-sh)'   : 'url(#ni-dim)';

const TierBadge = ({ tier }) => {
    const cls = tier === 'direct' ? 'tier-direct' : tier === 'indirect' ? 'tier-indirect' : 'tier-emerging';
    return <span className={`${cls} text-xs px-2 py-0.5 rounded-full font-medium`}>{tier.charAt(0).toUpperCase()+tier.slice(1)}</span>;

const SignalBadge = ({ type }) => {
    const cls = `signal-${type}`;
    return <span className={`${cls} text-xs px-2 py-0.5 rounded-full font-medium`}>{type.charAt(0).toUpperCase()+type.slice(1)}</span>;
};

const SeverityBadge = ({ severity }) => {
    const cls = `sev-${severity}`;
    return <span className={`${cls} text-xs px-2 py-0.5 rounded-md font-medium`}>{severity.charAt(0).toUpperCase()+severity.slice(1)}</span>;

const CompetitorAvatar = ({ competitor, size = 'md' }) => {
    const sz = size === 'sm' ? 'w-6 h-6 text-xs' : size === 'lg' ? 'w-10 h-10 text-base' : 'w-8 h-8 text-sm';
    return (
        <div className={`${sz} rounded-lg flex items-center justify-center font-bold flex-shrink-0`}
             style={{ background: competitor.color + '25', color: competitor.color, border: `1px solid ${competitor.color}40` }}>
            {competitor.logo}
        </div>
    );
};

const Sparkline = ({ data, color = '#a5b4fc' }) => {
    const max = Math.max(...data, 1);
    return (
        <div className="flex items-end gap-px h-6">
            {data.map((v, i) => (
                <div key={i} className="sparkline-bar w-1.5 rounded-sm"
                     style={{ height: `${Math.max((v/max)*100, 8)}%`, background: color + (i === data.length-1 ? 'ff' : '60') }} />
            ))}
        </div>
    );
};

                <div className="flex items-center gap-2">

                            className="text-xs border border-[#2A3560] hover:border-[#a5b4fc] text-[#7A84A8] hover:text-[#a5b4fc] px-3 py-1.5 rounded-lg transition-colors">

                            <tr key={c.id} className={`table-row-hover ${ri%2===0?'':'bg-[#090B1E]/40'}`}>
                                {cols.map(col => {
                                    const changed = isChanged(c.id, col);
                                    let val = c[col];
                                    let cell = null;
                                    if (col === 'name') cell = (
                                        <div className="flex items-center gap-2">
                                            <CompetitorAvatar competitor={c} size="sm" />

                                            {c.status}

                                    );

                                        <span className={val>0?'text-[#a5b4fc] font-medium':'text-[#323860]'}>{val}</span>
                                    );
                                    else cell = <span className="text-[#B0B8D0]">{val}</span>;

                                    return (
                                        <td key={col} className={`px-3 py-2.5 border-b border-[#0D1028] whitespace-nowrap ${changed?'changed-cell':''}`}>
                                            {cell}
                                        </td>
                                    );
                                })}
                            </tr>
                        ))}
                    </tbody>
                </table>
            </div>
        </div>
    );
};

// ─── Alerts View ──────────────────────────────────────────────────────────────
const AlertsView = () => {
    const [alerts, setAlerts] = useState(MOCK_ALERTS);
    const [severity, setSeverity] = useState('all');
    const [filter, setFilter] = useState('all'); // all | unread | read

    const markRead = (id) => setAlerts(prev => prev.map(a => a.id===id?{...a,read:true}:a));
    const markAllRead = () => setAlerts(prev => prev.map(a=>({...a,read:true})));

    const filtered = alerts.filter(a => {
        if (severity !== 'all' && a.severity !== severity) return false;
        if (filter === 'unread' && a.read) return false;
        if (filter === 'read' && !a.read) return false;
        return true;
    });

    const unread = alerts.filter(a=>!a.read).length;

    const formatTime = (iso) => {
        const d = new Date(iso);
        return d.toLocaleDateString('en-US', {month:'short',day:'numeric'}) + ' · ' + d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    };

    return (
        <div className="flex-1 overflow-y-auto fade-in">
            <div className="max-w-3xl mx-auto px-6 py-5 space-y-4">
                {/* Header */}
                <div className="flex items-center justify-between">
                    <div>
                        <h2 className="text-xl font-bold text-white">Alerts</h2>
                        <p className="text-[#48527A] text-sm mt-0.5">{unread} unread · {alerts.length} total</p>
                    </div>
                    <div className="flex items-center gap-2">
                        <select className="bg-[#0D1028] border border-[#2A3560] rounded-lg px-3 py-1.5 text-xs text-[#B0B8D0] focus:outline-none"
                                value={severity} onChange={e=>setSeverity(e.target.value)}>
                            <option value="all">All severities</option>
                            <option value="critical">Critical only</option>
                            <option value="high">High +</option>
                            <option value="medium">Medium</option>
                            <option value="low">Low</option>
                        </select>
                        <select className="bg-[#0D1028] border border-[#2A3560] rounded-lg px-3 py-1.5 text-xs text-[#B0B8D0] focus:outline-none"
                                value={filter} onChange={e=>setFilter(e.target.value)}>
                            <option value="all">All</option>
                            <option value="unread">Unread</option>
                            <option value="read">Read</option>
                        </select>
                        {unread > 0 && (
                            <button onClick={markAllRead} className="text-xs text-[#7A84A8] hover:text-[#E8ECF8] px-3 py-1.5 border border-[#2A3560] rounded-lg transition-colors">
                                Mark all read
                            </button>
                        )}
                    </div>
                </div>

                {/* Alert list */}
                {filtered.length === 0 && (
                    <div className="bg-[#0D1028] border border-[#1A2448] rounded-xl p-8 text-center text-[#48527A] text-sm">
                        No alerts match your filters.
                    </div>
                )}
                {filtered.map(alert => {
                    const comp = MOCK_COMPETITORS.find(c=>c.id===alert.competitorId);
                    const sig = MOCK_SIGNALS.find(s=>s.id===alert.signalId);
                    if (!comp) return null;
                    return (
                        <div key={alert.id}
                             className={`bg-[#0D1028] border rounded-xl p-4 flex gap-3 transition-colors ${alert.read?'border-[#1A2448] opacity-70':'border-[#2A3560]'}`}>
                            {!alert.read && <div className="w-1.5 h-1.5 rounded-full bg-[#c7d2fe] mt-1.5 flex-shrink-0" />}
                            {alert.read && <div className="w-1.5 h-1.5 mt-1.5 flex-shrink-0" />}
                            <CompetitorAvatar competitor={comp} size="sm" />
                            <div className="flex-1 min-w-0 space-y-1.5">
                                <div className="flex items-center gap-2 flex-wrap">
                                    <span className="text-xs font-medium text-[#E8ECF8]">{comp.name}</span>
                                    {sig && <SignalBadge type={sig.type} />}
                                    <SeverityBadge severity={alert.severity} />
                                    <span className="text-xs text-[#323860]">{formatTime(alert.date)}</span>
                                </div>
                                <p className="text-sm text-[#B0B8D0] leading-relaxed">{alert.body}</p>
                            </div>
                            {!alert.read && (
                                <button onClick={()=>markRead(alert.id)} className="text-xs text-[#323860] hover:text-[#7A84A8] flex-shrink-0">Mark read</button>
                            )}
                        </div>
                    );
                })}

                {/* Delivery settings */}
                <div className="bg-[#0D1028] border border-[#1A2448] rounded-xl p-4 space-y-3">
                    <div className="text-xs text-[#48527A] font-medium uppercase tracking-wider">Alert Delivery Settings</div>
                    <div className="grid grid-cols-2 gap-3">
                        {[['In-app notifications','Enabled'],['Email digest','End-of-day batch'],['Slack','Not connected'],['Minimum severity','High + Critical']].map(([k,v])=>(
                            <div key={k} className="flex items-center justify-between p-2.5 bg-[#090B1E] rounded-lg">
                                <span className="text-xs text-[#7A84A8]">{k}</span>
                                <span className="text-xs text-[#B0B8D0]">{v}</span>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        </div>
    );
};

const StatusBadge = ({ status }) => {
    const map = {
        in_progress: { label:'In Progress', cls:'bg-[rgba(165,180,252,0.13)] text-[#a5b4fc] border border-[rgba(165,180,252,0.28)]' },
        planned:     { label:'Planned',     cls:'bg-[rgba(103,232,249,0.1)] text-[#67e8f9] border border-[rgba(103,232,249,0.25)]' },
        shipped:     { label:'Shipped',     cls:'bg-[rgba(52,255,189,0.1)] text-[#34ffbd] border border-[rgba(52,255,189,0.25)]' },
        blocked:     { label:'Blocked',     cls:'bg-[rgba(255,107,132,0.13)] text-[#ff6b84] border border-[rgba(255,107,132,0.28)]' },
        done:        { label:'Done',        cls:'bg-[rgba(52,255,189,0.1)] text-[#34ffbd] border border-[rgba(52,255,189,0.25)]' },
        in_progress_task: { label:'In Progress', cls:'bg-[rgba(165,180,252,0.13)] text-[#a5b4fc] border border-[rgba(165,180,252,0.28)]' },
        todo:        { label:'To Do',       cls:'bg-[#111435] text-[#48527A] border border-[#1A2448]' },
        active:      { label:'Active',      cls:'bg-[rgba(52,255,189,0.1)] text-[#34ffbd] border border-[rgba(52,255,189,0.25)]' },
    };
    const s = map[status] || map.todo;
    return <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${s.cls}`}>{s.label}</span>;
};

// ─── Sprint View ──────────────────────────────────────────────────────────────
const SprintView = () => {
    const [sprintId, setSprintId] = useState('sp1');
    const sprint = MOCK_SPRINTS.find(s=>s.id===sprintId);
    const [groupBy, setGroupBy] = useState('epic');

    const statusGroups = ['done','in_progress','blocked','todo'];
    const statusLabels = { done:'Done', in_progress:'In Progress', blocked:'Blocked', todo:'To Do' };

    const epicGroups = [...new Set(sprint.items.map(t=>t.epicId))].map(eid=>{
        const epic = MOCK_EPICS.find(e=>e.id===eid);
        return { epic, tasks: sprint.items.filter(t=>t.epicId===eid) };
    });

    const velocityPct = Math.round((sprint.velocity.completed / sprint.velocity.planned) * 100);

    const TaskRow = ({ task }) => {
        const member = MOCK_TEAM.find(m=>m.id===task.assignee);
        const statusColors = { done:'#34ffbd', in_progress:'#a5b4fc', blocked:'#ff6b84', todo:'#2A3560' };
        return (
            <div className="flex items-center gap-2.5 py-2 px-3 rounded-lg hover:bg-[#111435] transition-colors group">
                <span className="w-2 h-2 rounded-full flex-shrink-0" style={{background:statusColors[task.status]}} />
                <span className={`flex-1 text-xs ${task.status==='done'?'line-through text-[#323860]':'text-[#B0B8D0]'}`}>{task.title}</span>
                <SourceTag source={task.source} sourceId={task.sourceId} />
                {member && (
                    <div className="flex items-center gap-1.5">
                        <TeamAvatar member={member} size="sm" />
                        <span className="text-xs text-[#48527A] hidden group-hover:block">{member.name.split(' ')[0]}</span>
                    </div>
                )}
                <span className="text-xs text-[#323860] w-6 text-right font-mono">{task.points}p</span>
                {task.status === 'blocked' && <Icon name="circle_dot" size={10} color="#ff6b84" />}
            </div>
        );
    };

    return (
        <div className="flex-1 overflow-y-auto fade-in">
            <div className="px-6 py-5 space-y-4">
                {/* Header */}
                <div className="flex items-center justify-between">
                    <div>
                        <div className="flex items-center gap-2 text-xs text-[#48527A] mb-1">
                            <span>Roadmap</span><span>›</span><span className="text-[#B0B8D0]">Sprints</span>
                        </div>
                        <div className="flex items-center gap-3">
                            <h1 className="text-xl font-bold text-white">{sprint.name}</h1>
                            <StatusBadge status={sprint.status} />
                        </div>
                        <p className="text-[#48527A] text-sm mt-0.5">{sprint.startDate} → {sprint.endDate}</p>
                    </div>
                    <div className="flex items-center gap-2">
                        {MOCK_SPRINTS.map(s=>(
                            <button key={s.id} onClick={()=>setSprintId(s.id)}
                                    className={`text-xs px-3 py-1.5 rounded-lg border transition-colors ${s.id===sprintId?'border-[#a5b4fc] text-[#a5b4fc] bg-[rgba(165,180,252,0.08)]':'border-[#2A3560] text-[#48527A] hover:text-[#B0B8D0]'}`}>
                                {s.name}
                            </button>
                        ))}
                        <select className="bg-[#0D1028] border border-[#2A3560] rounded-lg px-3 py-1.5 text-xs text-[#B0B8D0] focus:outline-none"
                                value={groupBy} onChange={e=>setGroupBy(e.target.value)}>
                            <option value="epic">Group by Epic</option>
                            <option value="status">Group by Status</option>
                        </select>
                    </div>
                </div>

                {/* Sprint goal + velocity */}
                <div className="bg-[rgba(165,180,252,0.07)] border border-[rgba(165,180,252,0.2)] rounded-xl p-4 space-y-3">
                    <div className="flex items-start justify-between">
                        <div>
                            <div className="text-xs text-[#a5b4fc] font-medium uppercase tracking-wider mb-1">Sprint Goal</div>
                            <p className="text-sm text-[#E8ECF8]">"{sprint.goal}"</p>
                        </div>
                        <div className="text-right flex-shrink-0 ml-4">
                            <div className="text-xs text-[#48527A] mb-0.5">Velocity</div>
                            <div className="text-xl font-bold text-white">{sprint.velocity.completed}<span className="text-sm text-[#48527A]">/{sprint.velocity.planned}p</span></div>
                        </div>
                    </div>
                    <div className="grid grid-cols-4 gap-3">
                        {[
                            { label:'Done', count:sprint.items.filter(t=>t.status==='done').length, color:'#34ffbd' },
                            { label:'In Progress', count:sprint.items.filter(t=>t.status==='in_progress').length, color:'#a5b4fc' },
                            { label:'Blocked', count:sprint.items.filter(t=>t.status==='blocked').length, color:'#ff6b84' },
                            { label:'To Do', count:sprint.items.filter(t=>t.status==='todo').length, color:'#48527A' },
                        ].map(s=>(
                            <div key={s.label} className="bg-[#090B1E] rounded-lg p-2.5 text-center">
                                <div className="text-lg font-bold" style={{color:s.color}}>{s.count}</div>
                                <div className="text-xs text-[#48527A]">{s.label}</div>
                            </div>
                        ))}
                    </div>
                    <div className="h-1.5 rounded-full bg-[#111435] overflow-hidden">
                        <div className="h-full rounded-full" style={{width:`${velocityPct}%`, background:'linear-gradient(90deg,#a5b4fc,#67e8f9)'}} />
                    </div>
                </div>

                {/* Task list — grouped */}
                {groupBy === 'epic' ? (
                    <div className="space-y-4">
                        {epicGroups.map(({epic, tasks})=>(
                            <div key={epic?.id} className="bg-[#0D1028] border border-[#1A2448] rounded-xl overflow-hidden">
                                <div className="flex items-center justify-between px-4 py-3 border-b border-[#1A2448] bg-[#090B1E]">
                                    <div className="flex items-center gap-2">
                                        <span className="text-xs font-semibold text-[#E8ECF8]">{epic?.title || 'Unknown Epic'}</span>
                                        <StatusBadge status={epic?.status || 'todo'} />
                                        {epic && <SourceTag source={epic.source} sourceId={epic.sourceId} />}
                                    </div>
                                    <span className="text-xs text-[#48527A]">{tasks.length} tasks · {tasks.reduce((a,t)=>a+t.points,0)}p</span>
                                </div>
                                <div className="p-2 space-y-0.5">
                                    {tasks.map(task=><TaskRow key={task.id} task={task} />)}
                                </div>
                            </div>
                        ))}
                    </div>
                ) : (
                    <div className="space-y-4">
                        {statusGroups.map(status=>{
                            const tasks = sprint.items.filter(t=>t.status===status);
                            if (!tasks.length) return null;
                            return (
                                <div key={status} className="bg-[#0D1028] border border-[#1A2448] rounded-xl overflow-hidden">
                                    <div className="flex items-center justify-between px-4 py-3 border-b border-[#1A2448] bg-[#090B1E]">
                                        <div className="flex items-center gap-2">
                                            <StatusBadge status={status} />
                                        </div>
                                        <span className="text-xs text-[#48527A]">{tasks.length} tasks</span>
                                    </div>
                                    <div className="p-2 space-y-0.5">
                                        {tasks.map(task=><TaskRow key={task.id} task={task} />)}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                )}
            </div>
        </div>
    );
};

// ─── Resources View ───────────────────────────────────────────────────────────
const ResourcesView = () => {
    const teams = [...new Set(MOCK_TEAM.map(m=>m.team))];
    const overAllocated = MOCK_TEAM.filter(m=>m.allocated >= m.capacity);
    const underUtilized = MOCK_TEAM.filter(m=>m.allocated < 60);

    const getCapacityColor = (allocated, capacity) => {
        const pct = (allocated / capacity) * 100;
        if (pct >= 100) return '#ff6b84';
        if (pct >= 85) return '#ffd040';
        return '#34ffbd';
    };

    return (
        <div className="flex-1 overflow-y-auto fade-in">
            <div className="px-6 py-5 space-y-5">
                <div>
                    <div className="flex items-center gap-2 text-xs text-[#48527A] mb-1">
                        <span>Roadmap</span><span>›</span><span className="text-[#B0B8D0]">Resourcing</span>
                    </div>
                    <h1 className="text-xl font-bold text-white">Team Resourcing</h1>
                    <p className="text-[#48527A] text-sm mt-0.5">{MOCK_TEAM.length} people · current sprint allocation</p>
                </div>

                {/* Summary flags */}
                <div className="grid grid-cols-3 gap-3">
                    <StatCard label="Team Members" value={MOCK_TEAM.length} sub="Across engineering, design, product, QA" color="#a5b4fc" icon="users" />
                    <StatCard label="Over-Allocated" value={overAllocated.length} sub={overAllocated.map(m=>m.name.split(' ')[0]).join(', ')} color="#ff6b84" icon="warning" />
                    <StatCard label="Under-Utilized" value={underUtilized.length} sub="Capacity available" color="#ffd040" icon="bulb" />
                </div>

                {/* Per-team capacity */}
                {teams.map(team=>{
                    const members = MOCK_TEAM.filter(m=>m.team===team);
                    const teamLabel = team.charAt(0).toUpperCase()+team.slice(1);
                    return (
                        <div key={team} className="bg-[#0D1028] border border-[#1A2448] rounded-xl p-4 space-y-3">
                            <div className="flex items-center justify-between">
                                <div className="text-sm font-semibold text-white capitalize">{teamLabel}</div>
                                <div className="text-xs text-[#48527A]">{members.length} member{members.length>1?'s':''}</div>
                            </div>
                            <div className="space-y-3">
                                {members.map(member=>{
                                    const pct = Math.round((member.allocated / member.capacity) * 100);
                                    const col = getCapacityColor(member.allocated, member.capacity);
                                    const memberEpics = MOCK_EPICS.filter(e=>
                                        (e.owner===member.id || e.contributors.includes(member.id)) &&
                                        e.status === 'in_progress'
                                    );
                                    return (
                                        <div key={member.id} className="space-y-1.5">
                                            <div className="flex items-center gap-3">
                                                <TeamAvatar member={member} size="md" />
                                                <div className="flex-1 min-w-0">
                                                    <div className="flex items-center justify-between mb-0.5">
                                                        <span className="text-xs font-medium text-[#E8ECF8]">{member.name}</span>
                                                        <span className="text-xs font-bold" style={{color:col}}>{pct}%</span>
                                                    </div>
                                                    <div className="text-xs text-[#48527A]">{member.role}</div>
                                                </div>
                                            </div>
                                            <div className="h-2 rounded-full bg-[#111435] overflow-hidden ml-10">
                                                <div className="h-full rounded-full transition-all" style={{width:`${Math.min(pct,100)}%`, background:col}} />
                                            </div>
                                            {memberEpics.length > 0 && (
                                                <div className="ml-10 flex flex-wrap gap-1">
                                                    {memberEpics.map(e=>(
                                                        <span key={e.id} className="text-xs text-[#48527A] bg-[#111435] px-1.5 py-0.5 rounded truncate max-w-[160px]">{e.title}</span>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    );
                })}
            </div>
        </div>
    );
};

// ─── Integrations View ────────────────────────────────────────────────────────
const RoadmapIntegrationsView = () => {
    const connected = MOCK_ROADMAP_INTEGRATIONS.filter(i=>i.status==='connected');
    const disconnected = MOCK_ROADMAP_INTEGRATIONS.filter(i=>i.status==='disconnected');

    const formatSync = (iso) => {
        if (!iso) return '—';
        const d = new Date(iso);
        return d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}) + ' · ' + d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    };

    return (
        <div className="flex-1 overflow-y-auto fade-in">
            <div className="px-6 py-5 space-y-5">
                <div>
                    <div className="flex items-center gap-2 text-xs text-[#48527A] mb-1">

                    </div>
                    <h1 className="text-xl font-bold text-white">Integrations</h1>
                    <p className="text-[#48527A] text-sm mt-0.5">Connect your project management tools for automatic roadmap sync.</p>

                <div className="grid grid-cols-3 gap-3">
                    <StatCard label="Connected" value={connected.length} sub="Auto-syncing" color="#34ffbd" icon="check" />
                    <StatCard label="Items Synced" value={connected.reduce((a,i)=>a+i.itemsSynced,0)} sub="Across all sources" color="#a5b4fc" icon="refresh" />
                    <StatCard label="Available" value={disconnected.length} sub="Not yet connected" color="#48527A" icon="○" />
                </div>

                {/* Connected integrations */}
                <div className="space-y-3">
                    <div className="text-xs text-[#48527A] font-medium uppercase tracking-wider">Connected</div>
                    {connected.map(intg=>(
                        <div key={intg.id} className="bg-[#0D1028] border border-[#1A2448] rounded-xl p-4 flex items-center gap-4">
                            <div className="w-10 h-10 rounded-xl flex items-center justify-center text-sm font-bold flex-shrink-0"

                                {intg.icon}
                            </div>
                            <div className="flex-1 min-w-0">
                                <div className="flex items-center gap-2 mb-0.5">
                                    <span className="text-sm font-semibold text-[#E8ECF8]">{intg.name}</span>
                                    <span className="text-xs text-[#34ffbd] bg-[rgba(52,255,189,0.1)] border border-[rgba(52,255,189,0.2)] px-1.5 py-0.5 rounded-full">● Connected</span>
                                </div>
                                <div className="text-xs text-[#48527A]">{intg.workspace}</div>
                            </div>
                            <div className="text-right flex-shrink-0">
                                <div className="text-xs text-[#B0B8D0] font-medium">{intg.itemsSynced} items</div>
                                <div className="text-xs text-[#323860]">Last sync: {formatSync(intg.lastSync)}</div>

                            <div className="flex items-center gap-2 flex-shrink-0">

                                {intg.icon}

                            <div className="flex-1 min-w-0">
                                <div className="text-sm font-semibold text-[#E8ECF8] mb-0.5">{intg.name}</div>
                                <div className="text-xs text-[#323860]">Not connected</div>

                            <button className="text-xs bg-[#a5b4fc] hover:bg-[#c7d2fe] text-white px-4 py-1.5 rounded-lg transition-colors flex-shrink-0">Connect</button>
                        </div>
                    ))}
                </div>

                {/* Sync settings */}
                <div className="bg-[#0D1028] border border-[#1A2448] rounded-xl p-4 space-y-3">
                    <div className="text-xs text-[#48527A] font-medium uppercase tracking-wider">Sync Settings</div>
                    {[
                        ['Sync frequency', 'Every 15 minutes'],
                        ['Conflict resolution', 'Source of record wins'],
                        ['Deleted items', 'Archive in Scoped (do not delete)'],
                        ['New items from source', 'Auto-add to roadmap'],
                    ].map(([k,v])=>(
                        <div key={k} className="flex items-center justify-between py-2 border-b border-[#111435] last:border-0">
                            <span className="text-sm text-[#B0B8D0]">{k}</span>
                            <span className="text-xs text-[#48527A] bg-[#111435] px-2 py-1 rounded">{v}</span>
                        </div>
                    ))}
                </div>

                {/* Changelog */}
                <div className="bg-[#0D1028] border border-[#1A2448] rounded-xl p-4 space-y-3">
                    <div className="text-xs text-[#48527A] font-medium uppercase tracking-wider">Recent Sync Activity</div>
                    {MOCK_ROADMAP_CHANGELOG.map((entry,i)=>{
                        const intg = MOCK_ROADMAP_INTEGRATIONS.find(x=>x.id===entry.source);
                        const typeColor = { sync:'#a5b4fc', risk:'#ff6b84', complete:'#34ffbd', added:'#67e8f9' };
                        const typeIcon  = { sync:<Icon name='refresh' size={12} color='#a5b4fc'/>, risk:<Icon name='warning' size={12} color='#ff6b84'/>, complete:<Icon name='check' size={12} color='#34ffbd'/>, added:<Icon name='plus' size={12} color='#67e8f9'/> };
                        return (
                            <div key={i} className="flex items-start gap-3">
                                <span className="flex-shrink-0 mt-0.5">{typeIcon[entry.type]}</span>
                                <div className="flex-1">
                                    <p className="text-xs text-[#B0B8D0] leading-relaxed">{entry.message}</p>
                                    <div className="flex items-center gap-2 mt-0.5">
                                        <span className="text-xs text-[#323860]">{entry.date}</span>
                                        {intg && <span className="text-xs font-medium" style={{color:intg.color}}>{intg.name}</span>}
