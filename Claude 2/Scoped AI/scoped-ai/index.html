                            </div>
                        );
                    })}
                </div>
            </div>
        </div>
    );
};

// ─── Timeline View ────────────────────────────────────────────────────────────
const TimelineView = () => {
    const TODAY = new Date('2026-03-08');

    // Zoom levels: how many days each "cell" represents, and the total window
    const ZOOM_LEVELS = [
        { label:'2 Weeks', cellDays:1,  totalDays:14,  cellPx:52 },
        { label:'1 Month', cellDays:1,  totalDays:31,  cellPx:36 },
        { label:'3 Months',cellDays:7,  totalDays:91,  cellPx:52 },
        { label:'6 Months',cellDays:14, totalDays:182, cellPx:48 },
    ];
    const [zoomIdx, setZoomIdx] = useState(2);   // default: 3 months
    const [groupBy, setGroupBy]   = useState('status'); // status | team | owner
    const [hoveredId, setHoveredId] = useState(null);
    const [tooltip, setTooltip]   = useState(null); // { epic, x, y }
    const scrollRef = React.useRef(null);

    const zoom = ZOOM_LEVELS[zoomIdx];

    // Window start: pushed back so "past" is visible
    const windowStart = new Date(TODAY);
    windowStart.setDate(windowStart.getDate() - Math.round(zoom.totalDays * 0.25));

    const totalCells = Math.ceil(zoom.totalDays / zoom.cellDays);
    const totalWidth = totalCells * zoom.cellPx;

    // Helpers
    const daysBetween = (a, b) => Math.round((b - a) / 86400000);

    const dateToX = (dateStr) => {
        const d = new Date(dateStr);
        const days = daysBetween(windowStart, d);
        return Math.round((days / zoom.cellDays) * zoom.cellPx);
    };

    const epicWidth = (epic) => {
        const s = new Date(epic.startDate);
        const e = new Date(epic.targetDate);
        const days = Math.max(daysBetween(s, e), zoom.cellDays);
        return Math.max(Math.round((days / zoom.cellDays) * zoom.cellPx), 40);
    };

    // "Today" X position
    const todayX = dateToX(TODAY.toISOString().slice(0,10));

    // Build header cells (dates)
    const headerCells = [];
    for (let i = 0; i < totalCells; i++) {
        const d = new Date(windowStart);
        d.setDate(d.getDate() + i * zoom.cellDays);
        headerCells.push(d);
    }

    // Format header label based on zoom
    const fmtCell = (d) => {
        if (zoom.cellDays === 1) {
            const dow = ['Su','Mo','Tu','We','Th','Fr','Sa'][d.getDay()];
            return { top: dow, bot: d.getDate() };
        }
        if (zoom.cellDays === 7) {
            return { top: d.toLocaleDateString('en-US',{month:'short'}), bot: `${d.getDate()}` };
        }
        return { top: d.toLocaleDateString('en-US',{month:'short'}), bot: `${d.getDate()}–${new Date(d.getTime()+zoom.cellDays*86400000).getDate()}` };
    };

    // Month boundary markers for the header
    const monthBoundaries = [];
    let lastMonth = -1;
    headerCells.forEach((d, i) => {
        if (d.getMonth() !== lastMonth) {
            monthBoundaries.push({ x: i * zoom.cellPx, label: d.toLocaleDateString('en-US',{month:'long', year:'numeric'}) });
            lastMonth = d.getMonth();
        }
    });

    // Group epics
    const STATUS_ORDER = ['in_progress','planned','shipped'];
    const TEAM_ORDER   = ['engineering','design','product','qa'];

    const groupedEpics = (() => {
        if (groupBy === 'status') {
            return STATUS_ORDER.map(s => ({
                label: s === 'in_progress' ? 'In Progress' : s === 'planned' ? 'Planned' : 'Shipped',
                epics: MOCK_EPICS.filter(e => e.status === s),
            })).filter(g => g.epics.length);
        }
        if (groupBy === 'team') {
            return TEAM_ORDER.map(t => ({
                label: t.charAt(0).toUpperCase() + t.slice(1),
                epics: MOCK_EPICS.filter(e => e.team === t),
            })).filter(g => g.epics.length);
        }
        // owner
        return MOCK_TEAM.map(m => ({
            label: m.name,
            member: m,
            epics: MOCK_EPICS.filter(e => e.owner === m.id),
        })).filter(g => g.epics.length);
    })();

    // Bar color
    const barColor = (epic) => {
        if (epic.atRisk)               return { bg:'rgba(255,107,132,0.25)', border:'#ff6b84', text:'#ff6b84' };
        if (epic.status === 'shipped') return { bg:'rgba(52,255,189,0.15)',  border:'#34ffbd', text:'#34ffbd' };
        if (epic.status === 'planned') return { bg:'rgba(103,232,249,0.12)', border:'#67e8f9', text:'#67e8f9' };
        // in_progress — color by priority
        const p = { critical:'#ff6b84', high:'#ffd040', medium:'#a5b4fc', low:'#48527A' };
        const c = p[epic.priority] || '#a5b4fc';
        return { bg:`rgba(165,180,252,0.18)`, border:c, text:c };
    };

    const ROW_H   = 40;   // px per epic row
    const LABEL_W = 220;  // px for left label column

    return (
        <div className="flex-1 flex flex-col overflow-hidden fade-in">
            {/* Toolbar */}
            <div className="px-5 py-3 border-b border-[#1A2448] flex items-center gap-3 flex-shrink-0 bg-[#090B1E]">
                <div>
                    <div className="flex items-center gap-2 text-xs text-[#48527A] mb-0.5">
                        <span>Roadmap</span><span>›</span><span className="text-[#B0B8D0]">Timeline</span>
                    </div>
                    <h1 className="text-base font-bold text-white leading-none">Timeline</h1>
                </div>
                <div className="flex-1" />
                {/* Zoom buttons */}
                <div className="flex items-center gap-1 bg-[#0D1028] border border-[#1A2448] rounded-lg p-0.5">
                    {ZOOM_LEVELS.map((z, i) => (
                        <button key={z.label} onClick={() => setZoomIdx(i)}
                                className={`text-xs px-2.5 py-1 rounded-md transition-colors ${i === zoomIdx ? 'bg-[#1A2448] text-white' : 'text-[#48527A] hover:text-[#B0B8D0]'}`}>
                            {z.label}
                        </button>
                    ))}
                </div>
                {/* Group by */}
                <select className="bg-[#0D1028] border border-[#2A3560] rounded-lg px-3 py-1.5 text-xs text-[#B0B8D0] focus:outline-none"
                        value={groupBy} onChange={e => setGroupBy(e.target.value)}>
                    <option value="status">Group: Status</option>
                    <option value="team">Group: Team</option>
                    <option value="owner">Group: Owner</option>
                </select>
                {/* Today button */}
                <button onClick={() => {
                    if (scrollRef.current) scrollRef.current.scrollLeft = Math.max(0, todayX - 200);
                }} className="text-xs border border-[#2A3560] text-[#a5b4fc] hover:border-[#a5b4fc] px-3 py-1.5 rounded-lg transition-colors">
                    Today
                </button>
            </div>

            {/* Main grid — two-pane: labels left, scrollable chart right */}
            <div className="flex flex-1 overflow-hidden">
                {/* Left label pane */}
                <div className="flex-shrink-0 border-r border-[#1A2448] bg-[#090B1E] overflow-hidden" style={{width: LABEL_W}}>
                    {/* Header spacer (matches 2-row date header height) */}
                    <div className="border-b border-[#1A2448]" style={{height:52}} />
                    {/* Group rows */}
                    <div className="overflow-y-hidden" style={{overflowY:'hidden'}}>
                        {groupedEpics.map(group => (
                            <div key={group.label}>
                                {/* Group header */}
                                <div className="flex items-center gap-2 px-3 py-1.5 bg-[#07081A] border-b border-[#1A2448]" style={{height:32}}>
                                    {group.member && (
                                        <div className="w-4 h-4 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0"
                                             style={{background:group.member.color+'20', color:group.member.color}}>
                                            {group.member.avatar.slice(0,1)}
                                        </div>
                                    )}
                                    <span className="text-xs font-semibold text-[#7A84A8] uppercase tracking-wider">{group.label}</span>
                                    <span className="text-xs text-[#323860]">{group.epics.length}</span>
                                </div>
                                {/* Epic label rows */}
                                {group.epics.map(epic => {
                                    const owner = MOCK_TEAM.find(m => m.id === epic.owner);
                                    const col = barColor(epic);
                                    return (
                                        <div key={epic.id}
                                             className="flex items-center gap-2 px-3 border-b border-[#111435] cursor-default"
                                             style={{height: ROW_H, background: hoveredId === epic.id ? 'rgba(165,180,252,0.04)' : 'transparent'}}
                                             onMouseEnter={() => setHoveredId(epic.id)}
                                             onMouseLeave={() => setHoveredId(null)}>
                                            {/* Status dot */}
                                            <span className="w-2 h-2 rounded-full flex-shrink-0" style={{background: col.border}} />
                                            {/* Title */}
                                            <span className="text-xs text-[#B0B8D0] truncate flex-1 leading-tight">{epic.title}</span>
                                            {/* Owner avatar */}
                                            {owner && (
                                                <div className="w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0"
                                                     style={{background:owner.color+'20', color:owner.color, border:`1px solid ${owner.color}30`}}>
                                                    {owner.avatar.slice(0,1)}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        ))}
                    </div>
                </div>

                {/* Right scrollable chart pane */}
                <div className="flex-1 overflow-x-auto overflow-y-auto" ref={scrollRef}>
                    <div style={{width: totalWidth, minWidth: totalWidth, position:'relative'}}>

                        {/* Date header — two rows: month + day/week */}
                        <div className="sticky top-0 z-20 border-b border-[#1A2448]" style={{background:'#07081A', height:52}}>
                            {/* Month labels */}
                            <div className="absolute top-0 left-0 right-0" style={{height:22}}>
                                {monthBoundaries.map((mb, i) => (
                                    <div key={i} className="absolute flex items-center"
                                         style={{left: mb.x, top:0, height:22, paddingLeft:8}}>
                                        <span className="text-xs font-semibold text-[#a5b4fc] whitespace-nowrap">{mb.label}</span>
                                    </div>
                                ))}
                            </div>
                            {/* Day / week cells */}
                            <div className="absolute bottom-0 left-0 flex" style={{height:30}}>
                                {headerCells.map((d, i) => {
                                    const { top, bot } = fmtCell(d);
                                    const isToday = d.toDateString() === TODAY.toDateString();
                                    const isWeekend = zoom.cellDays === 1 && (d.getDay() === 0 || d.getDay() === 6);
                                    return (
                                        <div key={i}
                                             className="flex-shrink-0 flex flex-col items-center justify-center border-r border-[#111435]"
                                             style={{
                                                 width: zoom.cellPx,
                                                 background: isToday ? 'rgba(165,180,252,0.12)' : isWeekend ? 'rgba(255,255,255,0.015)' : 'transparent',
                                             }}>
                                            {zoom.cellDays === 1 ? (
                                                <>
                                                    <span className={`text-xs leading-none font-medium ${isToday ? 'text-[#a5b4fc]' : isWeekend ? 'text-[#2A3560]' : 'text-[#323860]'}`}>{top}</span>
                                                    <span className={`text-xs leading-none mt-0.5 font-bold ${isToday ? 'text-[#a5b4fc]' : isWeekend ? 'text-[#2A3560]' : 'text-[#48527A]'}`}>{bot}</span>
                                                </>
                                            ) : (
                                                <span className={`text-xs font-medium ${isToday ? 'text-[#a5b4fc]' : 'text-[#48527A]'}`}>{top} {bot}</span>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* Chart body */}
                        <div style={{position:'relative'}}>
                            {/* Weekend / alternating column shading */}
                            {zoom.cellDays === 1 && headerCells.map((d, i) => {
                                const isWeekend = d.getDay() === 0 || d.getDay() === 6;
                                if (!isWeekend) return null;
                                return (
                                    <div key={i} style={{
                                        position:'absolute', top:0, bottom:0,
                                        left: i * zoom.cellPx, width: zoom.cellPx,
                                        background:'rgba(255,255,255,0.012)', pointerEvents:'none'
                                    }} />
                                );
                            })}

                            {/* Vertical grid lines */}
                            {headerCells.map((d, i) => (
                                <div key={i} style={{
                                    position:'absolute', top:0, bottom:0,
                                    left: i * zoom.cellPx, width:1,
                                    background:'#111435', pointerEvents:'none'
                                }} />
                            ))}

                            {/* Today line */}
                            {todayX >= 0 && todayX <= totalWidth && (
                                <div style={{
                                    position:'absolute', top:0, bottom:0,
                                    left: todayX, width:2,
                                    background:'rgba(165,180,252,0.55)',
                                    pointerEvents:'none', zIndex:10,
                                }}>
                                    <div style={{
                                        position:'absolute', top:4, left:'50%', transform:'translateX(-50%)',
                                        background:'#a5b4fc', borderRadius:3,
                                        padding:'1px 4px', fontSize:9, color:'#090B1E', fontWeight:700, whiteSpace:'nowrap'
                                    }}>TODAY</div>
                                </div>
                            )}

                            {/* Group rows + epic bars */}
                            {groupedEpics.map(group => (
                                <div key={group.label}>
                                    {/* Group header row */}
                                    <div style={{height:32, borderBottom:'1px solid #1A2448', background:'#07081A'}} />
                                    {/* Epic bar rows */}
                                    {group.epics.map(epic => {
                                        const x   = dateToX(epic.startDate);
                                        const w   = epicWidth(epic);
                                        const col = barColor(epic);
                                        const owner = MOCK_TEAM.find(m => m.id === epic.owner);
                                        const isHovered = hoveredId === epic.id;
                                        const clampedX = Math.max(x, 0);
                                        const clampedW = Math.max(w - (clampedX - x), 20);

                                        return (
                                            <div key={epic.id}
                                                 style={{
                                                     height: ROW_H,
                                                     borderBottom:'1px solid #111435',
                                                     position:'relative',
                                                     background: isHovered ? 'rgba(165,180,252,0.03)' : 'transparent',
                                                     transition:'background 0.1s',
                                                 }}
                                                 onMouseEnter={() => setHoveredId(epic.id)}
                                                 onMouseLeave={() => setHoveredId(null)}>

                                                {/* Epic bar */}
                                                <div
                                                    style={{
                                                        position:'absolute',
                                                        left: clampedX + 4,
                                                        width: Math.max(clampedW - 8, 20),
                                                        top: 7, height: ROW_H - 14,
                                                        borderRadius: 6,
                                                        background: col.bg,
                                                        border: `1.5px solid ${col.border}`,
                                                        display:'flex', alignItems:'center',
                                                        paddingLeft: 8, paddingRight: 6,
                                                        gap: 6,
                                                        cursor:'pointer',
                                                        boxShadow: isHovered ? `0 0 12px ${col.border}40` : 'none',
                                                        transition:'box-shadow 0.15s',
                                                        overflow:'hidden',
                                                        zIndex: isHovered ? 5 : 1,
                                                    }}
                                                    onClick={e => {
                                                        setTooltip(prev => prev?.epic.id === epic.id ? null : { epic, x: e.clientX, y: e.clientY });
                                                    }}
                                                >
                                                    {/* Progress fill inside bar */}
                                                    {epic.status !== 'shipped' && epic.progress > 0 && (
                                                        <div style={{
                                                            position:'absolute', left:0, top:0, bottom:0,
                                                            width:`${epic.progress}%`,
                                                            background: col.border + '22',
                                                            borderRadius: '4px 0 0 4px',
                                                            pointerEvents:'none',
                                                        }} />
                                                    )}
                                                    {/* Risk flag */}
                                                    {epic.atRisk && <Icon name='warning' size={10} color='#ff6b84' />}
                                                    {/* Label */}
                                                    <span style={{
                                                        fontSize:11, fontWeight:600,
                                                        color: col.text,
                                                        whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis',
                                                        flex:1, zIndex:1,
                                                    }}>{epic.title}</span>
                                                    {/* Progress % */}
                                                    {epic.status !== 'shipped' && (
                                                        <span style={{fontSize:10, color:col.text, opacity:0.7, flexShrink:0, zIndex:1}}>{epic.progress}%</span>
                                                    )}
                                                    {epic.status === 'shipped' && (
                                                        <Icon name='check' size={10} color='#34ffbd' style={{zIndex:1}} />
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            </div>

            {/* Click tooltip / detail panel */}
            {tooltip && (
                <div className="fixed inset-0 z-50 pointer-events-none">
                    <div
                        className="pointer-events-auto fade-in"
                        style={{
                            position:'absolute',
                            left: Math.min(tooltip.x + 12, window.innerWidth - 340),
                            top:  Math.min(tooltip.y + 8,  window.innerHeight - 280),
                            width: 320,
                            background:'#111435',
                            border:'1px solid #2A3560',
                            borderRadius:12,
                            padding:16,
                            boxShadow:'0 8px 32px rgba(0,0,0,0.5)',
                        }}
                    >
                        {/* Close */}
                        <button onClick={() => setTooltip(null)}
                                className="absolute top-3 right-3 text-[#48527A] hover:text-white leading-none"><Icon name="x" size={14} color="currentColor" /></button>
                        {(() => {
                            const e  = tooltip.epic;
                            const col = barColor(e);
                            const owner = MOCK_TEAM.find(m => m.id === e.owner);
                            const contributors = e.contributors.map(id => MOCK_TEAM.find(m => m.id === id)).filter(Boolean);
                            return (
                                <div className="space-y-3 pr-4">
                                    <div>
                                        <div className="flex items-center gap-2 mb-1 flex-wrap">
                                            <span className="text-sm font-bold text-white">{e.title}</span>
                                            {e.atRisk && <span className="flex items-center gap-1 text-xs text-[#ff6b84]"><Icon name="warning" size={10} color="#ff6b84" />At risk</span>}
                                        </div>
                                        <p className="text-xs text-[#7A84A8] leading-relaxed">{e.description}</p>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        {[
                                            ['Start',    e.startDate],
                                            ['Target',   e.targetDate],
                                            ['Progress', `${e.progress}%`],
                                            ['Tasks',    `${e.completedTasks}/${e.totalTasks}`],
                                        ].map(([k,v]) => (
                                            <div key={k} className="bg-[#090B1E] rounded-lg p-2">
                                                <div className="text-xs text-[#48527A]">{k}</div>
                                                <div className="text-xs font-medium text-[#E8ECF8] mt-0.5">{v}</div>
                                            </div>
                                        ))}
                                    </div>
                                    {/* Progress bar */}
                                    <div className="h-1.5 rounded-full bg-[#1A2448] overflow-hidden">
                                        <div className="h-full rounded-full" style={{width:`${e.progress}%`, background: col.border}} />
                                    </div>
                                    {e.atRisk && (
                                        <div className="flex gap-1.5 text-xs text-[#ff6b84] bg-[rgba(255,107,132,0.08)] rounded-lg p-2">
                                            <Icon name="warning" size={13} color="#ff6b84" className="flex-shrink-0" /><span>{e.riskReason}</span>
                                        </div>
                                    )}
                                    {/* Team */}
                                    <div className="flex items-center gap-2">
                                        {owner && (
                                            <div className="flex items-center gap-1.5">
                                                <div className="w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold"
                                                     style={{background:owner.color+'20', color:owner.color}}>{owner.avatar.slice(0,1)}</div>
                                                <span className="text-xs text-[#7A84A8]">{owner.name}</span>
                                            </div>
                                        )}
                                        {contributors.map(c => (
                                            <div key={c.id} className="w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold"
                                                 style={{background:c.color+'20', color:c.color}}>{c.avatar.slice(0,1)}</div>
                                        ))}
                                    </div>
                                    {/* Source */}
                                    <SourceTag source={e.source} sourceId={e.sourceId} />
                                    <div className="flex flex-wrap gap-1 pt-1">
                                        {e.tags.map(t=>(
                                            <span key={t} className="text-xs px-1.5 py-0.5 bg-[#1A2448] text-[#48527A] rounded">{t}</span>
                                        ))}
                                    </div>
                                </div>
                            );
                        })()}
                    </div>
                </div>
            )}
        </div>
    );
};

const SettingsConnections = () => {
    const [connections, setConnections] = useState(MOCK_CONNECTIONS);

    const toggleConn = (id) => {
        setConnections(cs => cs.map(c => {
            if (c.id !== id) return c;
            if (c.status === 'connected' || c.status === 'error') return {...c, status:'disconnected', error:null};
            return {...c, status:'connected', error:null};
        }));
    };

    const connectedCount = connections.filter(c=>c.status==='connected').length;
    const errorCount = connections.filter(c=>c.status==='error').length;

    // Sort: errors first, then connected, then disconnected — each group alphabetically
    const sorted = [...connections].sort((a, b) => {
        const rank = { error: 0, connected: 1, disconnected: 2 };
        if (rank[a.status] !== rank[b.status]) return rank[a.status] - rank[b.status];
        return a.name.localeCompare(b.name);
    });

    return (
        <div className="flex-1 overflow-y-auto fade-in">
            <div className="px-6 py-6 space-y-5">
                {/* Header */}
                <div className="flex items-start justify-between">
                    <div>
                        <h1 className="text-lg font-semibold text-white">Connections</h1>
                        <p className="text-sm text-[#48527A] mt-1">{connectedCount} of {connections.length} integrations active</p>
                    </div>
                    {errorCount > 0 && (
                        <div className="flex items-center gap-1.5 px-3 py-1.5 bg-[rgba(255,107,132,0.08)] border border-[rgba(255,107,132,0.2)] rounded-lg">
                            <Icon name="warning" size={12} color="#ff6b84" />
                            <span className="text-xs text-[#ff6b84]">{errorCount} connection {errorCount===1?'error':'errors'}</span>
                        </div>
                    )}
                </div>

                {/* Grid */}
                <div className="grid grid-cols-3 gap-2">
                    {sorted.map(conn => (
                        <div key={conn.id}
                             className={`bg-[#0D1028] border rounded-xl p-4 transition-colors ${conn.status==='error' ? 'border-[rgba(255,107,132,0.3)]' : conn.status==='connected' ? 'border-[#1A2448] hover:border-[rgba(52,255,189,0.2)]' : 'border-[#1A2448] hover:border-[#2A3560]'}`}>
                            <div className="flex items-center gap-3 mb-2.5">
                                <div style={{opacity: conn.status==='disconnected' ? 0.4 : 1}}>
                                    <ConnLogo id={conn.id} />
                                </div>
                                <div className="flex-1 min-w-0">
                                    <div className="text-sm font-medium text-[#E8ECF8] truncate">{conn.name}</div>
                                    <div className="flex items-center gap-1 mt-0.5">
                                        {conn.status === 'connected' && <>
                                            <span className="w-1.5 h-1.5 rounded-full bg-[#34ffbd] flex-shrink-0" />
                                            <span className="text-xs text-[#34ffbd]">Connected</span>
                                        </>}
                                        {conn.status === 'disconnected' && (
                                            <span className="text-xs text-[#48527A]">Not connected</span>
                                        )}
                                        {conn.status === 'error' && <>
                                            <Icon name="warning" size={10} color="#ff6b84" />
                                            <span className="text-xs text-[#ff6b84]">Error</span>
                                        </>}
                                    </div>
                                </div>
                            </div>
                            <p className="text-xs text-[#48527A] leading-relaxed mb-3">{conn.description}</p>
                            {conn.status === 'error' && conn.error && (
                                <div className="mb-3 flex items-start gap-1.5 text-xs text-[#ff6b84] bg-[rgba(255,107,132,0.07)] border border-[rgba(255,107,132,0.18)] rounded-lg px-2.5 py-2">
                                    <Icon name="warning" size={10} color="#ff6b84" className="flex-shrink-0 mt-0.5" />
                                    {conn.error}
                                </div>
                            )}
                            <button onClick={()=>toggleConn(conn.id)}
                                    className={`w-full py-1.5 text-xs rounded-lg transition-colors font-medium ${
                                        conn.status === 'connected'
                                            ? 'text-[#48527A] border border-[#1A2448] hover:text-[#ff6b84] hover:border-[rgba(255,107,132,0.3)]'
                                            : conn.status === 'error'
                                            ? 'text-[#ff6b84] border border-[rgba(255,107,132,0.3)] bg-[rgba(255,107,132,0.08)] hover:bg-[rgba(255,107,132,0.15)]'
                                            : 'text-[#a5b4fc] border border-[rgba(165,180,252,0.25)] bg-[rgba(165,180,252,0.08)] hover:bg-[rgba(165,180,252,0.15)]'
                                    }`}>
                                {conn.status === 'connected' ? 'Disconnect' : conn.status === 'error' ? 'Reconnect' : 'Connect'}
                            </button>
                        </div>
                    ))}
                </div>
            </div>
        </div>
    );
};

    // Main nav modules (top 5) and Settings (bottom)
    const mainModules = modules.filter(m => m.id !== 'settings');
    const settingsModule = modules.find(m => m.id === 'settings');

    const labelStyle = (show) => ({
        opacity: show ? 1 : 0,
        maxWidth: show ? '120px' : '0',
        transition: 'opacity 0.2s ease, max-width 0.25s cubic-bezier(0.4,0,0.2,1)',
    });

    // Shared sidebar component
    const AppSidebar = () => (
        <nav className={`app-nav ${navExpanded ? 'expanded' : 'collapsed'}`}>
            <NavGradientDefs />

            {/* Logo row */}
            <div className="nav-logo-row">
                <div className="nav-logo">
                    <svg width="34" height="28" viewBox="0 0 34 28" fill="none" xmlns="http://www.w3.org/2000/svg"
                        style={{filter:'drop-shadow(0 0 5px rgba(120,160,255,0.55)) drop-shadow(0 0 10px rgba(0,200,255,0.25))'}}>
                        {/* Outer pills slightly smaller (ry:9) for the tapered-ends look */}
                        {/* Pill 1 — deep purple, leftmost */}
                        <ellipse cx="8.5"  cy="14" rx="6.5" ry="9.5" fill="#5B18D8" fillOpacity="0.95"/>
                        {/* Pill 2 — vivid violet, left-center */}
                        <ellipse cx="14.5" cy="14" rx="7"   ry="10.5" fill="#8B4FFF" fillOpacity="0.9"/>
                        {/* Pill 3 — electric blue-cyan, right-center */}
                        <ellipse cx="20.5" cy="14" rx="7"   ry="10.5" fill="#0099FF" fillOpacity="0.9"/>
                        {/* Pill 4 — bright cyan, rightmost */}
                        <ellipse cx="26.5" cy="14" rx="6.5" ry="9.5" fill="#00DDFF" fillOpacity="0.95"/>
                    </svg>
                </div>
                <span className="nav-logo-text">Scoped AI</span>
            </div>

            {/* Main modules */}
            <div style={{flex:1, display:'flex', flexDirection:'column', overflowY:'auto', overflowX:'hidden'}}>
                {mainModules.map(m => (
                    <button key={m.id}
                        className={`nav-item ${module === m.id ? 'active' : ''}`}
                        title={navExpanded ? '' : m.label}
                        onClick={() => setModule(m.id)}>
                        <ModuleIcon id={m.id} active={module === m.id} />
                        <span className="nav-label" style={labelStyle(navExpanded)}>{m.label}</span>
                    </button>
                ))}
            </div>

            {/* Settings pinned above expand toggle */}
            <div style={{borderTop:'1px solid rgba(255,255,255,0.04)', paddingTop:'4px'}}>
                <button
                    className={`nav-item ${module === 'settings' ? 'active' : ''}`}
                    title={navExpanded ? '' : 'Settings'}
                    onClick={() => setModule('settings')}>
                    <ModuleIcon id="settings" active={module === 'settings'} />
                    <span className="nav-label" style={labelStyle(navExpanded)}>Settings</span>
                </button>
            </div>

            {/* Expand / collapse toggle — fully inside nav, always visible */}
            <button className="nav-expand-row" onClick={() => setNavExpanded(e => !e)}>
                <div className="nav-expand-icon">
                    <div className={`nav-expand-chevron ${navExpanded ? 'open' : ''}`}>
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                            <path d="M3 5 L7 9 L11 5" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
                        </svg>
                    </div>
                </div>
                <span className="nav-expand-label">{navExpanded ? 'Collapse' : ''}</span>
            </button>
        </nav>
    );

    return (
        <div className="h-screen flex bg-black">
            <AppSidebar />

            <div className="flex flex-1 flex-col overflow-hidden">

                <div className="flex flex-1 overflow-hidden">
                    {/* Module sub-nav — only for Insights */}
                    {module === 'insights' && (
                        <nav className="w-52 border-r border-[#1A2448] bg-[#090B1E] flex-shrink-0 flex flex-col" style={{overflowY:'auto'}}>
                            {/* Project switcher */}
                            <div className="px-3 pt-3 pb-2 border-b border-[#1A2448] flex-shrink-0">
                                <div className="text-xs text-[#323860] uppercase tracking-wider font-medium px-2 mb-1.5">Project</div>
                                <div className="relative">
                                    <button
                                        onClick={()=>setProjectPickerOpen(o=>!o)}
                                        className="w-full flex items-center gap-2 px-2.5 py-2 rounded-lg bg-[#0D1028] border border-[#1A2448] hover:border-[#2A3560] transition-colors text-left">
                                        <div className="w-2 h-2 rounded-full flex-shrink-0" style={{background:activeProject.color}} />
                                        <span className="flex-1 text-xs font-medium text-[#E8ECF8] truncate">{activeProject.name}</span>
                                        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" className={`flex-shrink-0 transition-transform ${projectPickerOpen?'rotate-180':''}`}>
                                            <path d="M2 3.5 L5 6.5 L8 3.5" stroke="#48527A" strokeWidth="1.4" strokeLinecap="round"/>
                                        </svg>
                                    </button>

                                    {/* Dropdown */}
                                    {projectPickerOpen && (
                                        <div className="absolute left-0 right-0 top-full mt-1 bg-[#111435] border border-[#1A2448] rounded-lg shadow-lg z-50 overflow-hidden fade-in">
                                            {MOCK_PROJECTS.map(proj => (
                                                <button key={proj.id} onClick={()=>switchProject(proj.id)}
                                                        className={`w-full flex items-start gap-2.5 px-3 py-2.5 text-left hover:bg-[#1A2448] transition-colors ${proj.id===activeProjectId?'bg-[#1A2448]':''}`}>
                                                    <div className="w-2 h-2 rounded-full mt-1 flex-shrink-0" style={{background:proj.color}} />
                                                    <div className="flex-1 min-w-0">
                                                        <div className="text-xs font-medium text-[#E8ECF8] truncate">{proj.name}</div>
                                                        <div className="text-xs text-[#323860] truncate">{proj.industry} · {proj.stage}</div>
                                                    </div>
                                                    {proj.unreadAlerts > 0 && (
                                                        <span className="text-xs bg-[#a5b4fc] text-white rounded-full w-4 h-4 flex items-center justify-center flex-shrink-0 mt-0.5">{proj.unreadAlerts}</span>
                                                    )}
                                                </button>
                                            ))}
                                            <div className="border-t border-[#1A2448]">
                                                <button onClick={()=>setProjectPickerOpen(false)}
                                                        className="w-full flex items-center gap-2 px-3 py-2.5 text-left hover:bg-[#1A2448] transition-colors text-[#48527A] hover:text-[#B0B8D0]">
                                                    <span className="text-sm">+</span>
                                                    <span className="text-xs">New project</span>
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Nav items grouped */}
                            <div className="flex-1 py-2">
                                {['Overview','Analysis'].map(group => {
                                    const items = intelNavItems.filter(i=>i.group===group);
                                    return (
                                        <div key={group} className="mb-1">
                                            <div className="text-xs text-[#323860] uppercase tracking-wider font-medium px-5 py-2">{group}</div>
                                            {items.map(item => (
                                                <button key={item.id} onClick={()=>{ setView(item.id); if(item.id!=='profiles') setProfileId(null); setProjectPickerOpen(false); }}
                                                        className={`w-full flex items-center gap-2.5 px-5 py-2.5 text-sm text-left transition-colors ${view===item.id?'text-white bg-[#111435]':'text-[#48527A] hover:text-[#B0B8D0] hover:bg-[#0D1028]'}`}>
                                                    <Icon name={item.icon} size={14} color={view===item.id?'#a5b4fc':'#48527A'} />
                                                    <span className="flex-1">{item.label}</span>
                                                    {item.badge > 0 && (
                                                        <span className="w-5 h-5 rounded-full bg-[#a5b4fc] text-white text-xs flex items-center justify-center flex-shrink-0">{item.badge}</span>
                                                    )}
                                                </button>
                                            ))}
                                        </div>
                                    );
                                })}
                            </div>

                            <div className="px-3 pb-3 pt-2 border-t border-[#1A2448] flex-shrink-0">
                                <div className="text-xs text-[#323860] uppercase tracking-wider font-medium px-2 mb-1">Settings</div>
                                <button className="w-full flex items-center gap-2.5 px-5 py-2.5 text-sm text-[#48527A] hover:text-[#B0B8D0] hover:bg-[#0D1028] transition-colors text-left">
                                    <span className="text-base leading-none"></span>
                                    <span>Polling Schedule</span>
                                </button>
                                <button className="w-full flex items-center gap-2.5 px-5 py-2.5 text-sm text-[#48527A] hover:text-[#B0B8D0] hover:bg-[#0D1028] transition-colors text-left">
                                    <span className="text-base leading-none">+</span>
                                    <span>New Project</span>
                                </button>
                            </div>
                        </nav>
                    )}

                    {/* Roadmap sub-nav */}
                    {module === 'roadmap' && (
                        <nav className="w-52 border-r border-[#1A2448] bg-[#090B1E] flex-shrink-0 flex flex-col" style={{overflowY:'auto'}}>
                            <div className="px-3 pt-3 pb-2 border-b border-[#1A2448] flex-shrink-0">
                                <div className="text-xs text-[#323860] uppercase tracking-wider font-medium px-2 mb-1.5">Project</div>
                                <div className="px-2 py-1.5 rounded-lg bg-[#0D1028] border border-[#1A2448] flex items-center gap-2">
                                    <div className="w-2 h-2 rounded-full flex-shrink-0" style={{background:activeProject.color}} />
                                    <span className="text-xs font-medium text-[#E8ECF8] truncate">{activeProject.name}</span>
                                </div>
                            </div>
                            <div className="flex-1 py-2">
                                {['Roadmap','Settings'].map(group => {
                                    const items = roadmapNavItems.filter(i=>i.group===group);
                                    return (
                                        <div key={group} className="mb-1">
                                            <div className="text-xs text-[#323860] uppercase tracking-wider font-medium px-5 py-2">{group}</div>
                                            {items.map(item => (
                                                <button key={item.id} onClick={()=>setRoadmapView(item.id)}
                                                        className={`w-full flex items-center gap-2.5 px-5 py-2.5 text-sm text-left transition-colors ${roadmapView===item.id?'text-white bg-[#111435]':'text-[#48527A] hover:text-[#B0B8D0] hover:bg-[#0D1028]'}`}>
                                                    <Icon name={item.icon} size={14} color={roadmapView===item.id?'#a5b4fc':'#48527A'} />
                                                    <span className="flex-1">{item.label}</span>
                                                </button>
                                            ))}
                                        </div>
                                    );
                                })}
                            </div>
                            <div className="px-3 pb-3 pt-2 border-t border-[#1A2448] flex-shrink-0">
                                <div className="flex items-center gap-2 px-2 py-1.5">
                                    <span className="w-1.5 h-1.5 rounded-full bg-[#34ffbd]" />
                                    <span className="text-xs text-[#48527A]">Syncing every 15m</span>
                                </div>
                            </div>
                        </nav>
                    )}

                    {/* Main content */}
                    {module === 'insights' && (
                        <>
                            {view === 'dashboard' && <MarketDashboard onNavigate={navigate} />}
                            {view === 'profiles' && <CompetitorProfiles initialId={profileId} onNavigate={navigate} />}
                            {view === 'spreadsheet' && <SpreadsheetView />}
                            {view === 'alerts' && <AlertsView />}
                            {view === 'weekly' && <WeeklyReport />}
                            {view === 'sizing' && <MarketSizingView />}
                            {view === 'positioning' && <PositioningView />}
                            {view === 'winloss' && <WinLossView />}
                        </>
                    )}
                    {module === 'roadmap' && (
                        <>
                            {roadmapView === 'overview'      && <RoadmapDashboard onNavigate={setRoadmapView} />}
                            {roadmapView === 'timeline'      && <TimelineView />}
                            {roadmapView === 'epics'         && <EpicsView onNavigate={setRoadmapView} />}
                            {roadmapView === 'sprints'       && <SprintView />}
                            {roadmapView === 'resources'     && <ResourcesView />}
                            {roadmapView === 'integrations'  && <RoadmapIntegrationsView />}
                        </>
                    )}
                    {module === 'settings' && <SettingsModule />}
                    {module !== 'insights' && module !== 'roadmap' && module !== 'settings' && <ComingSoonModule module={activeModule} />}
                </div>
            </div>
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
