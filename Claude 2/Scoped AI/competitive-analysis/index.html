const TierBadge = ({ tier }) => {
    const cls = tier === 'direct' ? 'tier-direct' : tier === 'indirect' ? 'tier-indirect' : 'tier-emerging';
    return <span className={`${cls} text-xs px-2 py-0.5 rounded-full font-medium`}>{tier.charAt(0).toUpperCase()+tier.slice(1)}</span>;

const SignalBadge = ({ type }) => {
    const cls = `signal-${type}`;
    return <span className={`${cls} text-xs px-2 py-0.5 rounded-full font-medium`}>{type.charAt(0).toUpperCase()+type.slice(1)}</span>;
};

const SeverityBadge = ({ severity }) => {
    const cls = `sev-${severity}`;
    return <span className={`${cls} text-xs px-2 py-0.5 rounded-md font-medium`}>{severity.charAt(0).toUpperCase()+severity.slice(1)}</span>;

const CompetitorAvatar = ({ competitor, size = 'md' }) => {
    const sz = size === 'sm' ? 'w-6 h-6 text-xs' : size === 'lg' ? 'w-10 h-10 text-base' : 'w-8 h-8 text-sm';
    return (
        <div className={`${sz} rounded-lg flex items-center justify-center font-bold flex-shrink-0`}
             style={{ background: competitor.color + '25', color: competitor.color, border: `1px solid ${competitor.color}40` }}>
            {competitor.logo}
        </div>
    );
};

const Sparkline = ({ data, color = '#4A5CFF' }) => {
    const max = Math.max(...data, 1);
    return (
        <div className="flex items-end gap-px h-6">
            {data.map((v, i) => (
                <div key={i} className="sparkline-bar w-1.5 rounded-sm"
                     style={{ height: `${Math.max((v/max)*100, 8)}%`, background: color + (i === data.length-1 ? 'ff' : '60') }} />
            ))}
        </div>
    );
};

const StatCard = ({ label, value, sub, color = '#4A5CFF', icon }) => (
    <div className="bg-[#0D1028] border border-[#1A2448] rounded-xl p-4 flex flex-col gap-1">
        <div className="flex items-center gap-2 text-[#48527A] text-xs">{icon && <span>{icon}</span>}{label}</div>

                                {cols.map(col => {

                        ))}
                    </tbody>
                </table>
            </div>
        </div>
    );
};

    const [alerts, setAlerts] = useState(MOCK_ALERTS);
    const [severity, setSeverity] = useState('all');
    const [filter, setFilter] = useState('all'); // all | unread | read

    const markRead = (id) => setAlerts(prev => prev.map(a => a.id===id?{...a,read:true}:a));
    const markAllRead = () => setAlerts(prev => prev.map(a=>({...a,read:true})));

    const filtered = alerts.filter(a => {
        if (severity !== 'all' && a.severity !== severity) return false;
        if (filter === 'unread' && a.read) return false;
        if (filter === 'read' && !a.read) return false;
        return true;
    });

    const unread = alerts.filter(a=>!a.read).length;

    const formatTime = (iso) => {
        const d = new Date(iso);
        return d.toLocaleDateString('en-US', {month:'short',day:'numeric'}) + ' · ' + d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    };

    return (
        <div className="flex-1 overflow-y-auto fade-in">
            <div className="max-w-3xl mx-auto px-6 py-5 space-y-4">
                {/* Header */}
                <div className="flex items-center justify-between">
                    <div>
                        <h2 className="text-xl font-bold text-white">Alerts</h2>
                        <p className="text-[#48527A] text-sm mt-0.5">{unread} unread · {alerts.length} total</p>
                    </div>
                    <div className="flex items-center gap-2">
                        <select className="bg-[#0D1028] border border-[#2A3560] rounded-lg px-3 py-1.5 text-xs text-[#B0B8D0] focus:outline-none"
                                value={severity} onChange={e=>setSeverity(e.target.value)}>
                            <option value="all">All severities</option>
                            <option value="critical">Critical only</option>
                            <option value="high">High +</option>
                            <option value="medium">Medium</option>
                            <option value="low">Low</option>
                        </select>
                        <select className="bg-[#0D1028] border border-[#2A3560] rounded-lg px-3 py-1.5 text-xs text-[#B0B8D0] focus:outline-none"
                                value={filter} onChange={e=>setFilter(e.target.value)}>
                            <option value="all">All</option>
                            <option value="unread">Unread</option>
                            <option value="read">Read</option>
                        </select>
                        {unread > 0 && (
                            <button onClick={markAllRead} className="text-xs text-[#7A84A8] hover:text-[#E8ECF8] px-3 py-1.5 border border-[#2A3560] rounded-lg transition-colors">
                                Mark all read
                            </button>
                        )}
                    </div>
                </div>

                {/* Alert list */}
                {filtered.length === 0 && (
                    <div className="bg-[#0D1028] border border-[#1A2448] rounded-xl p-8 text-center text-[#48527A] text-sm">
                        No alerts match your filters.
                    </div>
                )}
                {filtered.map(alert => {
                    const comp = MOCK_COMPETITORS.find(c=>c.id===alert.competitorId);
                    const sig = MOCK_SIGNALS.find(s=>s.id===alert.signalId);
                    if (!comp) return null;
                    return (
                        <div key={alert.id}
                             className={`bg-[#0D1028] border rounded-xl p-4 flex gap-3 transition-colors ${alert.read?'border-[#1A2448] opacity-70':'border-[#2A3560]'}`}>
                            {!alert.read && <div className="w-1.5 h-1.5 rounded-full bg-[#5B6EFF] mt-1.5 flex-shrink-0" />}
                            {alert.read && <div className="w-1.5 h-1.5 mt-1.5 flex-shrink-0" />}
                            <CompetitorAvatar competitor={comp} size="sm" />
                            <div className="flex-1 min-w-0 space-y-1.5">
                                <div className="flex items-center gap-2 flex-wrap">
                                    <span className="text-xs font-medium text-[#E8ECF8]">{comp.name}</span>
                                    {sig && <SignalBadge type={sig.type} />}
                                    <SeverityBadge severity={alert.severity} />
                                    <span className="text-xs text-[#323860]">{formatTime(alert.date)}</span>
                                </div>
                                <p className="text-sm text-[#B0B8D0] leading-relaxed">{alert.body}</p>
                            </div>
                            {!alert.read && (
                                <button onClick={()=>markRead(alert.id)} className="text-xs text-[#323860] hover:text-[#7A84A8] flex-shrink-0">Mark read</button>
                            )}
                        </div>
                    );
                })}

                {/* Delivery settings */}
                <div className="bg-[#0D1028] border border-[#1A2448] rounded-xl p-4 space-y-3">
                    <div className="text-xs text-[#48527A] font-medium uppercase tracking-wider">Alert Delivery Settings</div>
                    <div className="grid grid-cols-2 gap-3">
                        {[['In-app notifications','Enabled'],['Email digest','End-of-day batch'],['Slack','Not connected'],['Minimum severity','High + Critical']].map(([k,v])=>(
                            <div key={k} className="flex items-center justify-between p-2.5 bg-[#090B1E] rounded-lg">
                                <span className="text-xs text-[#7A84A8]">{k}</span>
                                <span className="text-xs text-[#B0B8D0]">{v}</span>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        </div>
    );
};

// ─── Weekly Report ────────────────────────────────────────────────────────────
const WeeklyReport = () => {
    const r = MOCK_WEEKLY_REPORT;
    const sevColors = { critical:'text-red-400', high:'text-amber-400', medium:'text-[#7B8FFF]', low:'text-[#7A84A8]' };

    return (
        <div className="flex-1 overflow-y-auto fade-in">
            <div className="max-w-3xl mx-auto px-6 py-5 space-y-5">
                {/* Header */}
                <div className="flex items-start justify-between">
                    <div>
                        <div className="text-xs text-[#48527A] mb-1">Weekly Market Report</div>
                        <h1 className="text-2xl font-bold text-white">Week of {r.weekOf}</h1>
                        <p className="text-[#48527A] text-sm mt-0.5">Generated {new Date(r.generatedAt).toLocaleString('en-US',{weekday:'long',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'})}</p>
                    </div>
                    <div className="flex gap-2">
                        <button className="text-xs border border-[#2A3560] text-[#7A84A8] hover:text-[#E8ECF8] px-3 py-1.5 rounded-lg transition-colors">Export PDF</button>
                        <button className="text-xs bg-[#4A5CFF] hover:bg-[#5B6EFF] text-white px-3 py-1.5 rounded-lg transition-colors">Generate Now</button>
                    </div>
                </div>

                {/* Alert summary strip */}
                <div className="flex gap-2 flex-wrap">
                    {Object.entries(r.alertSummary).filter(([k])=>k!=='total').map(([sev,count])=>(
                        <div key={sev} className="flex items-center gap-1.5 bg-[#0D1028] border border-[#1A2448] rounded-lg px-3 py-1.5">
                            <span className={`text-sm font-bold ${sevColors[sev]}`}>{count}</span>
                            <span className="text-xs text-[#48527A] capitalize">{sev}</span>
                        </div>
                    ))}
                    <div className="flex items-center gap-1.5 bg-[#0D1028] border border-[#1A2448] rounded-lg px-3 py-1.5">
                        <span className="text-sm font-bold text-[#E8ECF8]">{r.alertSummary.total}</span>
                        <span className="text-xs text-[#48527A]">total alerts</span>
                    </div>
                </div>

                {/* Market Pulse */}
                <div className="bg-[rgba(74,92,255,0.12)] border border-[#3A4AD0]/50 rounded-xl p-4 space-y-2">
                    <div className="flex items-center gap-2 text-xs text-[#7B8FFF] font-medium uppercase tracking-wider">
                        <span>⚡</span> Market Pulse
                    </div>
                    <p className="text-sm text-[#E8ECF8] leading-relaxed">{r.marketPulse}</p>
                </div>

                {/* Top Stories */}
                <div className="space-y-3">
                    <div className="text-xs text-[#48527A] font-medium uppercase tracking-wider">Top Stories</div>
                    {r.topStories.map((s,i) => {
                        const comp = MOCK_COMPETITORS.find(c=>c.name===s.competitor);
                        return (
                            <div key={i} className="bg-[#0D1028] border border-[#1A2448] rounded-xl p-4 space-y-2">
                                <div className="flex items-center gap-2 flex-wrap">
                                    {comp && <CompetitorAvatar competitor={comp} size="sm" />}
                                    <span className="font-medium text-white text-sm">{s.title}</span>
                                    <SignalBadge type={s.type} />
                                    <SeverityBadge severity={s.severity} />
                                </div>
                                <p className="text-sm text-[#B0B8D0] leading-relaxed">{s.summary}</p>
                            </div>
                        );
                    })}
                </div>

                {/* Competitor Moves */}
                <div className="space-y-3">
                    <div className="text-xs text-[#48527A] font-medium uppercase tracking-wider">Competitor Moves</div>
                    <div className="bg-[#0D1028] border border-[#1A2448] rounded-xl divide-y divide-[#1A2448]">
                        {r.competitorMoves.map((cm,i) => {
                            const comp = MOCK_COMPETITORS.find(c=>c.name===cm.competitor);
                            return (
                                <div key={i} className="p-3 flex gap-3">
                                    {comp && <CompetitorAvatar competitor={comp} size="sm" />}
                                    <div className="flex-1">
                                        <div className="text-xs font-medium text-[#E8ECF8] mb-1">{cm.competitor}</div>
                                        {cm.moves.map((m,j)=>(
                                            <div key={j} className="text-xs text-[#7A84A8] flex gap-1.5">
                                                <span className="text-[#323860] mt-0.5">·</span>{m}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>

                {/* Funding & M&A */}
                <div className="space-y-2">
                    <div className="text-xs text-[#48527A] font-medium uppercase tracking-wider">Funding & M&A</div>
                    {r.fundingMA.map((item,i)=>(
                        <div key={i} className="bg-[#0D1028] border border-[#1A2448] rounded-xl p-3 flex items-center gap-2">
                            <span className="text-emerald-500 text-sm">💰</span>
                            <span className="text-sm text-[#B0B8D0]">{item}</span>
                        </div>
                    ))}
                </div>

                {/* Signals to Watch */}
                <div className="space-y-2">
                    <div className="text-xs text-[#48527A] font-medium uppercase tracking-wider">Signals to Watch</div>
                    {r.signalsToWatch.map((s,i)=>(
                        <div key={i} className="bg-[#0D1028] border border-[#1A2448] rounded-xl p-3 flex gap-2">
                            <span className="text-amber-500 flex-shrink-0">👁</span>
                            <span className="text-sm text-[#B0B8D0]">{s}</span>
                        </div>
                    ))}
                </div>

                {/* Delivery settings */}
                <div className="bg-[#0D1028] border border-[#1A2448] rounded-xl p-4 space-y-3">
                    <div className="text-xs text-[#48527A] font-medium uppercase tracking-wider">Report Delivery</div>
                    <div className="flex items-center justify-between">
                        <span className="text-sm text-[#B0B8D0]">Weekly delivery schedule</span>
                        <span className="text-xs text-[#48527A] bg-[#111435] px-2 py-1 rounded">Monday · 7:00 AM</span>
                    </div>
                    <div className="flex gap-2">
                        {['In-app','Email'].map(ch=>(
                            <span key={ch} className="text-xs text-emerald-400 bg-emerald-900/20 border border-emerald-800/40 px-2 py-0.5 rounded">{ch}</span>
                        ))}
                        <span className="text-xs text-[#323860] bg-[#111435] px-2 py-0.5 rounded">Slack (not connected)</span>
                    </div>
                </div>
            </div>
        </div>
    );
};

// ─── App Shell ────────────────────────────────────────────────────────────────
const App = () => {
    // flow: 'setup' | 'confirm' | 'main'
    const [flow, setFlow] = useState('setup');
    const [view, setView] = useState('dashboard');
    const [profileId, setProfileId] = useState(null);
    const unreadAlerts = MOCK_ALERTS.filter(a=>!a.read).length;

    const navigate = (target, id) => {
        setView(target);
        if (id) setProfileId(id);
    };

    const navItems = [
        { id:'dashboard', label:'Market Dashboard', icon:'⬡' },
        { id:'profiles', label:'Competitor Profiles', icon:'📋' },
        { id:'spreadsheet', label:'Spreadsheet', icon:'🗂' },
        { id:'alerts', label:'Alerts', icon:'🔔', badge: unreadAlerts },
        { id:'weekly', label:'Weekly Report', icon:'📊' },
    ];

    if (flow === 'setup') return (
        <div className="h-screen flex flex-col bg-black">
            <div className="h-12 border-b border-[#0D1028] flex items-center px-5">
                <span className="text-sm font-semibold text-white">Trava</span>
                <span className="text-[#323860] mx-2">·</span>
                <span className="text-xs text-[#48527A]">Competitive Analysis</span>
            </div>
            <IdeaInput onComplete={() => setFlow('confirm')} />
        </div>
    );

    if (flow === 'confirm') return (
        <div className="h-screen flex flex-col bg-black">
            <div className="h-12 border-b border-[#0D1028] flex items-center px-5">
                <span className="text-sm font-semibold text-white">Trava</span>
                <span className="text-[#323860] mx-2">·</span>
                <span className="text-xs text-[#48527A]">Competitive Analysis</span>
            </div>
            <ConfirmationScreen onConfirm={() => { setFlow('main'); setView('dashboard'); }} />
        </div>
    );

    return (
        <div className="h-screen flex flex-col bg-black">
            {/* Top bar */}
            <div className="h-12 border-b border-[#0D1028] flex items-center px-5 gap-3 flex-shrink-0">
                <span className="text-sm font-semibold text-white">Trava</span>
                <span className="text-[#323860] mx-1">·</span>
                <span className="text-xs text-[#7A84A8] truncate max-w-xs">{MOCK_ANALYSIS.name}</span>
                <div className="flex-1" />
                <div className="flex items-center gap-1.5">
                    <span className="w-1.5 h-1.5 bg-emerald-500 rounded-full" />
                    <span className="text-xs text-[#48527A]">Monitoring active · Next poll 6:00 AM</span>
                </div>
            </div>

            <div className="flex flex-1 overflow-hidden">
                {/* Sidebar nav */}
                <nav className="w-52 border-r border-[#1A2448] bg-[#090B1E] flex-shrink-0 py-3">
                    <div className="px-3 mb-3">
                        <div className="text-xs text-[#323860] uppercase tracking-wider font-medium px-2 mb-1">Analysis</div>
                    </div>
                    {navItems.map(item => (
                        <button key={item.id} onClick={()=>{ setView(item.id); if(item.id!=='profiles') setProfileId(null); }}
                                className={`w-full flex items-center gap-2.5 px-5 py-2.5 text-sm text-left transition-colors ${view===item.id?'text-white bg-[#111435]':'text-[#48527A] hover:text-[#B0B8D0] hover:bg-[#0D1028]'}`}>
                            <span className="text-base leading-none">{item.icon}</span>
                            <span className="flex-1">{item.label}</span>
                            {item.badge > 0 && (
                                <span className="w-5 h-5 rounded-full bg-[#4A5CFF] text-white text-xs flex items-center justify-center flex-shrink-0">{item.badge}</span>
                            )}
                        </button>
                    ))}

                    <div className="px-3 mt-4 pt-4 border-t border-[#1A2448]">
                        <div className="text-xs text-[#323860] uppercase tracking-wider font-medium px-2 mb-1">Settings</div>
                        <button className="w-full flex items-center gap-2.5 px-5 py-2.5 text-sm text-[#48527A] hover:text-[#B0B8D0] hover:bg-[#0D1028] transition-colors text-left">
                            <span className="text-base leading-none">⚙</span>
                            <span>Polling Schedule</span>
                        </button>
                        <button className="w-full flex items-center gap-2.5 px-5 py-2.5 text-sm text-[#48527A] hover:text-[#B0B8D0] hover:bg-[#0D1028] transition-colors text-left">
                            <span className="text-base leading-none">+</span>
                            <span>New Analysis</span>
                        </button>
                    </div>
                </nav>

                {/* Main content */}
                {view === 'dashboard' && <MarketDashboard onNavigate={navigate} />}
                {view === 'profiles' && <CompetitorProfiles initialId={profileId} onNavigate={navigate} />}
                {view === 'spreadsheet' && <SpreadsheetView />}
                {view === 'alerts' && <AlertsView />}
                {view === 'weekly' && <WeeklyReport />}
            </div>
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
